            document.getElementById('publishPostBtn').onclick = async function() {
                const caption = document.getElementById('postCaptionInput').value.trim();
                const isReel = document.getElementById('postIsReel').checked;

                if (!selectedFileDataUrl) {
                    showToast('⚠️ الرجاء اختيار ملف أولاً', 'warning');
                    // shake effect
                    this.classList.add('shake-it');
                    setTimeout(() => this.classList.remove('shake-it'), 500);
                    return;
                }

                try {
                    const postData = {
                        id: generateId(),
                        authorUuid: currentUser.uuid,
                        authorUsername: currentUser.username,
                        caption,
                        mediaUrl: selectedFileDataUrl,
                        mediaType: selectedFileType,
                        timestamp: Date.now(),
                        isReel
                    };
                    await db.posts.put(postData);

                    // إظهار تأثير السباركل
                    const btnRect = this.getBoundingClientRect();
                    spawnSparkles(btnRect.left + btnRect.width / 2, btnRect.top, 20);

                    // إعادة تعيين
                    resetPostPreview();
                    document.getElementById('postCaptionInput').value = '';
                    document.getElementById('postIsReel').checked = false;

                    showToast('✨ تم النشر بنجاح!', 'success', 3500);
                    renderTab('home');
                } catch (err) {
                    showToast('❌ فشل النشر: ' + err.message, 'error');
                }
            };

            // ========== المحادثات ==========
            function getChatId(peerId) { return [currentUser.uuid, peerId].sort().join('_'); }

            function isPeerConnected(peerId) { const conn = peerConnections[peerId]; return conn && conn._aesKey &&
                conn.open; }

            async function renderChatList() { const container = document.createElement('div');
                const allMessages = await db.messages.toArray();
                const chatIds = [...new Set(allMessages.map(m => m.chatId))];
                const chatData = []; for (let chatId of chatIds) { const msgs = await db.messages.where('chatId').equals(
                        chatId).sortBy('timestamp'); if (!msgs.length) continue;
                    const last = msgs[msgs.length - 1];
                    const peerId = chatId.split('_').find(p => p !== currentUser.uuid); if (!peerId) continue;
                    const user = await db.accounts.get(peerId); if (!user) continue;
                    const unread = msgs.filter(m => m.senderUuid === peerId && !m.read).length;
                    chatData.push({ chatId, peerId, user, last, unread }); }
                chatData.sort((a, b) => b.last.timestamp - a.last.timestamp); if (!chatData.length) { container.innerHTML =
                        '<p style="text-align:center;color:#8b949e;padding:30px 0;">💬 لا توجد محادثات.</p>';
                    mainContent.appendChild(container); return; } for (let i = 0; i < chatData.length; i++) { const c =
                        chatData[i];
                    const item = document.createElement('div');
                    item.className = 'chat-list-item';
                    item.style.animationDelay = `${i*0.05}s`;
                    const lastText = c.last.mediaUrl ? (c.last.mediaType === 'image' ? '📷 صورة' : '🎬 فيديو') : (c.last
                        .text || '');
                    item.innerHTML =
                        `<img src="${c.user.profilePic||''}" alt=""><div class="chat-info"><div class="name">${c.user.username}</div><div class="last-msg">${c.last.senderUuid===currentUser.uuid?'أنت: ':''}${lastText}</div></div><div class="chat-time">${timeAgo(c.last.timestamp)}</div>${c.unread>0?`<div class="unread">${c.unread}</div>`:''}`;
                    item.onclick = () => startChatWith(c.peerId);
                    container.appendChild(item); }
                mainContent.appendChild(container); }

            function startChatWith(peerId) { connectToPeer(peerId);
                activeChatPeerId = peerId;
                showBackButton(true);
                renderChat(peerId);
                startChatRefresh(peerId); }

            function startChatRefresh(peerId) { stopChatRefresh();
                chatRefreshInterval = setInterval(async () => { if (activeChatPeerId === peerId) { await loadChatMessages(
                        peerId, true); } else { stopChatRefresh(); } }, 2000); }

            function stopChatRefresh() { if (chatRefreshInterval) { clearInterval(chatRefreshInterval);
                    chatRefreshInterval = null; } }

            async function connectToPeer(peerId) { if (isPeerConnected(peerId)) return; if (!peer) return; try { const
                    conn = peer.connect(peerId, { reliable: true });
                conn.on('open', async () => { peerConnections[peerId] = conn;
                    setupConnection(conn, peerId);
                    const key = await generateAESKey();
                    conn.send({ type: 'aes-key', key: await exportKey(key) });
                    conn._aesKey = key;
                    updateConnectionStatus(peerId); });
                conn.on('error', () => { updateConnectionStatus(peerId); });
                conn.on('close', () => { delete peerConnections[peerId];
                    updateConnectionStatus(peerId); }); } catch (e) {} }

            function setupConnection(conn, peerId) { conn.on('data', async (data) => { try { if (data.type === 'aes-key')
                        conn._aesKey = await importKey(data.key); else if (data.type === 'encrypted-message') { const
                            text = await decryptData(conn._aesKey, data.payload); if (activeChatPeerId === peerId)
                            displayMessageInChat(text, 'received');
                        await saveMessageToDB(peerId, text, 'received'); } else if (data.type === 'encrypted-media') {
                        const url = await decryptData(conn._aesKey, data.payload); if (activeChatPeerId === peerId)
                            displayMessageInChat('', 'received', url, data.mediaType);
                        await saveMessageToDB(peerId, '', 'received', url, data.mediaType); } else if (data.type ===
                        'typing') { if (activeChatPeerId === peerId) showTypingIndicator(); } else if (data.type ===
                        'read-receipt') { await db.messages.where({ chatId: getChatId(peerId), senderUuid: peerId,
                            read: false }).modify({ read: true, status: 'read' }); if (activeChatPeerId === peerId)
                            await loadChatMessages(peerId, true); } } catch (e) {} }); }

            function updateConnectionStatus(peerId) { const statusEl = document.getElementById('connectionStatus'); if (
                    statusEl) { const online = isPeerConnected(peerId);
                    statusEl.className = 'connection-status' + (online ? ' online' : '');
                    statusEl.innerHTML = online ? '<span class="dot"></span> متصل مباشر' :
                        '💾 الرسائل تُحفظ وتصل عند فتح المحادثة'; } }

            async function renderChat(peerId) { const user = await db.accounts.get(peerId); if (!user) { mainContent
                    .innerHTML = '<p class="text-center text-muted">المستخدم غير موجود</p>'; return; }
                topAvatar.src = user.profilePic || '';
                mainContent.innerHTML =
                    `<div class="connection-status" id="connectionStatus">💾 الرسائل تُحفظ وتصل عند فتح المحادثة</div><div class="chat-messages" id="chatMessages"></div><div class="chat-input-area"><button class="attach-btn" id="attachBtn">📎</button><input type="text" id="chatInput" placeholder="اكتب رسالة..."><button id="sendBtn">➤</button></div>`;
                updateConnectionStatus(peerId);
                await loadChatMessages(peerId);
                document.getElementById('sendBtn').onclick = () => sendMessageInChat(peerId);
                document.getElementById('chatInput').onkeydown = (e) => { if (e.key === 'Enter') sendMessageInChat(
                    peerId); };
                document.getElementById('attachBtn').onclick = () => attachMediaInChat(peerId);
                showBackButton(true); }

            async function loadChatMessages(peerId, silent = false) { const msgsDiv = document.getElementById(
                'chatMessages'); if (!msgsDiv) return; if (!silent) msgsDiv.innerHTML = '';
                const chatId = getChatId(peerId);
                const messages = await db.messages.where('chatId').equals(chatId).sortBy('timestamp');
                await db.messages.where({ chatId, senderUuid: peerId, read: false }).modify({ read: true,
                status: 'read' }); if (silent && messages.length === msgsDiv.querySelectorAll('.msg').length) return;
                msgsDiv.innerHTML = ''; for (let i = 0; i < messages.length; i++) { const m = messages[i];
                    const type = m.senderUuid === currentUser.uuid ? 'sent' : 'received';
                    displayMessageInChat(m.text, type, m.mediaUrl, m.mediaType, m.timestamp, i, m); }
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
                const conn = peerConnections[peerId]; if (conn && conn._aesKey) conn.send({ type: 'read-receipt' }); }

            function displayMessageInChat(text, type, mediaUrl, mediaType, timestamp, index = 0, msgObj = null) { const
                msgsDiv = document.getElementById('chatMessages'); if (!msgsDiv) return;
                const div = document.createElement('div');
                div.className = `msg ${type}`;
                div.style.animationDelay = `${index*0.02}s`;
                let html = ''; if (mediaUrl) html += mediaType === 'image' ?
                    `<div class="media-wrap"><img src="${mediaUrl}" alt="مرفق" loading="lazy"></div>` :
                    `<div class="media-wrap"><video src="${mediaUrl}" controls preload="metadata"></video></div>`; if (text)
                    html += text; if (timestamp) { html +=
                    `<span class="msg-time">${timeAgo(timestamp)}`; if (type === 'sent' && msgObj) { html +=
                        ` <span class="msg-status ${msgObj.read?'read':'sent'}">${msgObj.read?'✓✓':'✓'}</span>`; }
                    html += '</span>'; }
                div.innerHTML = html;
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight; }

            function showTypingIndicator() { const msgsDiv = document.getElementById('chatMessages'); if (!msgsDiv) return;
                const old = msgsDiv.querySelector('.typing-indicator'); if (old) old.remove();
                const div = document.createElement('div');
                div.className = 'typing-indicator';
                div.innerHTML = '<span></span><span></span><span></span>';
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight; if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { if (div.parentNode) div.remove(); }, 3000); }

            async function sendMessageInChat(peerId) { const input = document.getElementById('chatInput');
                const text = input.value.trim(); if (!text) return; try {
                displayMessageInChat(text, 'sent', null, null, Date.now());
                await saveMessageToDB(peerId, text, 'sent');
                input.value = '';
                const conn = peerConnections[peerId]; if (conn && conn._aesKey) { const enc = await encryptData(conn._aesKey,
                        text);
                    conn.send({ type: 'encrypted-message', payload: enc }); } else { showToast('💾 تم الحفظ – تصل عند فتح المحادثة',
                        'info', 2000); } } catch (e) { showToast('❌ فشل: ' + e.message, 'error'); } }

            async function attachMediaInChat(peerId) { const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'image/*,video/*';
                inp.onchange = async (e) => { const file = e.target.files[0]; if (!file) return; try { let dataUrl =
                            await readFileAsDataURL(file); if (file.type.startsWith('image/')) dataUrl = await compressImage(
                            dataUrl, 600, 0.6);
                        const mediaType = getFileType(file);
                        displayMessageInChat('', 'sent', dataUrl, mediaType, Date.now());
                        await saveMessageToDB(peerId, '', 'sent', dataUrl, mediaType);
                        const conn = peerConnections[peerId]; if (conn && conn._aesKey) { const enc = await encryptData(conn
                                ._aesKey, dataUrl);
                            conn.send({ type: 'encrypted-media', payload: enc, mediaType }); } else { showToast(
                                '💾 تم الحفظ – سيظهر المرفق عند فتح المحادثة', 'info', 2000); } } catch (err) {
                        showToast('❌ فشل: ' + err.message, 'error'); } };
                inp.click(); }

            async function saveMessageToDB(peerId, text, type, mediaUrl, mediaType) { const chatId = getChatId(peerId);
                const senderUuid = type === 'sent' ? currentUser.uuid : peerId;
                const receiverUuid = type === 'sent' ? peerId : currentUser.uuid;
                await db.messages.add({ chatId, senderUuid, receiverUuid, text: text || '', mediaUrl: mediaUrl || '',
                    mediaType: mediaType || '', timestamp: Date.now(), read: false, status: 'sent' });
                await db.chats.put({ id: chatId, participants: [currentUser.uuid, peerId].sort(), lastMessage: text || (
                        mediaType === 'image' ? '📷 صورة' : '🎬 فيديو'), lastTime: Date.now(), lastSender: senderUuid });
                if (receiverUuid !== currentUser.uuid) { await addNotification(receiverUuid,
                        `📬 رسالة جديدة من ${currentUser.username}`, 'message'); } }

            function initPeer() { peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true, config: { iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' }] } });
                peer.on('open', (id) => { if (currentUser) db.accounts.update(currentUser.uuid, { peerId: id }); });
                peer.on('connection', (conn) => { const pid = conn.peer;
                    peerConnections[pid] = conn;
                    setupConnection(conn, pid);
                    updateConnectionStatus(pid); });
                peer.on('error', () => {}); }

            // ========== المصادقة ==========
            document.getElementById('showRegister').onclick = () => { document.getElementById('loginForm').style.display =
                    'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginError').classList.add('hidden'); };
            document.getElementById('showLogin').onclick = () => { document.getElementById('registerForm').style.display =
                    'none';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('regError').classList.add('hidden'); };
            document.getElementById('loginBtn').onclick = async () => { const username = document.getElementById(
                    'loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('loginError');
                errorEl.classList.add('hidden'); if (!username || !password) { errorEl.textContent =
                        '⚠️ يرجى ملء جميع الحقول';
                    errorEl.classList.remove('hidden'); return; } try { const user = (await db.accounts.toArray()).find(
                        a => a.username === username); if (!user) { errorEl.textContent = '❌ المستخدم غير موجود';
                        errorEl.classList.remove('hidden'); return; } if (user.passwordHash !== await hashPassword(
                        password)) { errorEl.textContent = '❌ كلمة مرور خاطئة';
                        errorEl.classList.remove('hidden'); return; }
                    currentUser = user;
                    await saveSession(user.uuid);
                    document.getElementById('authScreen').classList.remove('active');
                    document.getElementById('mainScreen').classList.add('active');
                    adminMode = user.isAdmin || false; if (peer) db.accounts.update(user.uuid, { peerId: peer.id });
                    switchTab('home');
                    showToast(`👋 مرحباً ${user.username} – بياناتك محفوظة دائماً 💾`, 'success', 4000); } catch (e) {
                    errorEl.textContent = '❌ ' + e.message;
                    errorEl.classList.remove('hidden'); } };
            document.getElementById('registerBtn').onclick = async () => { const username = document.getElementById(
                    'regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const bio = document.getElementById('regBio').value.trim();
                const errorEl = document.getElementById('regError');
                errorEl.classList.add('hidden'); if (username.length < 3) { errorEl.textContent =
                        '⚠️ اسم المستخدم 3 أحرف على الأقل';
                    errorEl.classList.remove('hidden'); return; } if (password.length < 6) { errorEl.textContent =
                        '⚠️ كلمة المرور 6 أحرف على الأقل';
                    errorEl.classList.remove('hidden'); return; } if ((await db.accounts.toArray()).some(a => a
                        .username === username)) { errorEl.textContent = '❌ اسم المستخدم موجود';
                    errorEl.classList.remove('hidden'); return; } try { const newUser = { uuid: generateId(), username,
                        passwordHash: await hashPassword(password), profilePic: '', bio: bio ||
                            '📝 مرحباً، أنا في SecureGram!', createdAt: Date.now(), isAdmin: false };
                    await db.accounts.put(newUser);
                    currentUser = newUser;
                    await saveSession(newUser.uuid);
                    document.getElementById('authScreen').classList.remove('active');
                    document.getElementById('mainScreen').classList.add('active'); if (peer) db.accounts.update(newUser
                        .uuid, { peerId: peer.id });
                    switchTab('home');
                    showToast(`🎉 مرحباً ${username}! – بياناتك محفوظة دائماً 💾`, 'success', 4000); } catch (e) {
                    errorEl.textContent = '❌ ' + e.message;
                    errorEl.classList.remove('hidden'); } };

            window.logout = async function() { if (confirm('هل تريد تسجيل الخروج؟ (بياناتك ستبقى محفوظة)')) {
                stopChatRefresh();
                    await clearSession();
                    currentUser = null;
                    peerConnections = {};
                    activeChatPeerId = null;
                    adminMode = false;
                    resetPostPreview();
                    document.getElementById('mainScreen').classList.remove('active');
                    document.getElementById('authScreen').classList.add('active');
                    document.getElementById('loginPassword').value = '';
                    showToast('👋 تم تسجيل الخروج – بياناتك باقية 💾', 'info'); } };

            function viewProfile(uuid) { viewingProfileUuid = uuid;
                showBackButton(true);
                renderProfile(uuid); }

            function handleDeepLink() { const params = new URLSearchParams(window.location.search);
                const postId = params.get('post'); if (postId) setTimeout(async () => { const post = await db.posts.get(
                        postId); if (post) showPostModal(post); }, 500); }

            (async function init() { try { if (Notification.permission === 'default') Notification.requestPermission();
                    await initAdmin();
                    const savedUUID = await loadSession(); if (savedUUID) { const user = await db.accounts.get(
                        savedUUID); if (user) { currentUser = user;
                        adminMode = user.isAdmin || false;
                        document.getElementById('authScreen').classList.remove('active');
                        document.getElementById('mainScreen').classList.add('active');
                        initPeer();
                        switchTab('home');
                        handleDeepLink();
                        showToast('💾 تم استعادة جلستك – جميع بياناتك محفوظة', 'info', 3000); return; } }
                    document.getElementById('authScreen').classList.add('active');
                    document.getElementById('mainScreen').classList.remove('active');
                    initPeer(); } catch (e) { console.error('خطأ:', e);
                    showToast('❌ خطأ في تحميل التطبيق', 'error'); } })();

            async function cleanExpiredStories() { const expired = await db.stories.where('expiresAt').below(Date.now())
                    .toArray(); for (let s of expired) await db.stories.delete(s.id); }
            setInterval(cleanExpiredStories, 60000);
            setInterval(async () => { if (currentUser) await updateUnreadCounts(); }, 15000);

            window.viewProfile = viewProfile;
            window.followUser = followUser;
            window.startChatWith = startChatWith;
            window.showToast = showToast;

            console.log('✅ SecureGram V7.0 – نظام نشر متطور مع تأثيرات جميلة');
            console.log('👑 الأدمن: Yamangadhat / Yaman@2008');
            console.log('💾 جميع البيانات محفوظة في IndexedDB – تبقى بعد إغلاق المتصفح');
            console.log('📸 معاينة قبل النشر – تأثيرات سباركل – Glassmorphism UI');
        })();
    </script>
</body>
</html>
