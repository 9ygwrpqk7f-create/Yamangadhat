<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action=manipulation">
    <title>SecureGram – الجرام الكامل (أونلاين محلي)</title>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js">
    </script>
    <script src="https://unpkg.com/peerjs@1.5.0/dist/peerjs.min.js">
    </script>
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: #161b22;
            --bg-elevated: #1c2128;
            --border: #30363d;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --green: #238636;
            --green-hover: #2ea043;
            --red: #f85149;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --gradient-ig: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --radius: 16px;
            --radius-sm: 10px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --shadow-glow: 0 0 60px rgba(31, 111, 235, 0.25);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, 'SF Pro Display', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }

        #app {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: var(--bg-card);
            box-shadow: var(--shadow-glow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            border-radius: 0;
        }
        @media(min-width:520px) {
            #app {
                border-radius: 28px;
                height: 94vh;
                max-height: 860px;
                margin: 0 8px;
            }
        }

        /* ==================== الشاشات ==================== */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--bg-card);
            z-index: 1;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .screen.active {
            display: flex;
            z-index: 10;
            animation: screenIn 0.35s ease forwards;
        }
        @keyframes screenIn {
            from {
                opacity: 0;
                transform: scale(0.97);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ==================== المصادقة ==================== */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(ellipse at 50% 0%, #1c2333, #0d1117 80%);
            animation: bgPulse 6s ease-in-out infinite;
        }
        @keyframes bgPulse {
            0%,
            100% {
                background: radial-gradient(ellipse at 50% 0%, #1c2333, #0d1117 80%);
            }
            50% {
                background: radial-gradient(ellipse at 50% 0%, #1e2840, #0d1117 80%);
            }
        }
        .auth-box {
            width: 100%;
            max-width: 340px;
            background: var(--bg-elevated);
            padding: 32px 28px;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(8px);
            animation: authBoxIn 0.5s var(--transition-bounce) forwards;
        }
        @keyframes authBoxIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .auth-box h2 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 24px;
            font-size: 1.8em;
            letter-spacing: -0.5px;
        }
        .auth-box h2 span {
            background: var(--gradient-ig);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            animation: shimmer 2s ease-in-out infinite;
            background-size: 200% 200%;
        }
        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .auth-box label {
            font-size: 0.8em;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            transition: color 0.2s;
        }
        .auth-box input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 14px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: #f0f6fc;
            font-size: 0.95em;
            transition: border 0.25s, box-shadow 0.25s, transform 0.15s;
        }
        .auth-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            transform: translateY(-1px);
        }
        .auth-box button {
            width: 100%;
            padding: 12px;
            background: var(--green);
            border: none;
            color: #fff;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            font-size: 1em;
            margin-bottom: 8px;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .auth-box button:hover {
            background: var(--green-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(35, 134, 54, 0.35);
        }
        .auth-box button:active {
            transform: scale(0.96);
            transition: transform 0.1s;
        }
        .auth-box button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        .auth-box button:hover::after {
            transform: translateX(100%);
        }
        .auth-box .link {
            color: var(--accent);
            text-align: center;
            cursor: pointer;
            display: block;
            margin-top: 12px;
            font-size: 0.9em;
            transition: color 0.2s, transform 0.2s;
        }
        .auth-box .link:hover {
            color: #79c0ff;
            transform: scale(1.03);
        }
        .error {
            color: var(--red);
            margin-bottom: 12px;
            text-align: center;
            font-size: 0.85em;
            background: rgba(248, 81, 73, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(4px);
            }
        }
        .admin-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.7em;
            color: var(--text-muted);
            margin-top: 14px;
            border-top: 1px solid #21262d;
            padding-top: 14px;
        }
        .admin-badge span {
            background: #6e40c9;
            padding: 2px 10px;
            border-radius: 20px;
            color: #fff;
            font-weight: 600;
            animation: badgePulse 2s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(110, 64, 201, 0.5);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(110, 64, 201, 0);
            }
        }

        /* ==================== الشريط العلوي ==================== */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            justify-content: space-between;
            background: #0d1117;
            min-height: 56px;
            flex-shrink: 0;
            z-index: 20;
            backdrop-filter: blur(12px);
        }
        .top-bar h3 {
            color: var(--accent);
            font-size: 1.2em;
            font-weight: 700;
        }
        .top-bar h3 span {
            background: var(--gradient-ig);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-bar .left-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.8em;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: transform 0.2s, opacity 0.2s;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top-bar .back-btn:hover {
            transform: scale(1.2);
            background: rgba(88, 166, 255, 0.1);
        }
        .top-bar .back-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(20px);
        }
        .top-bar .top-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
            cursor: pointer;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
            flex-shrink: 0;
            background: #21262d;
        }
        .top-bar .top-avatar:hover {
            border-color: #79c0ff;
            transform: scale(1.08);
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .top-bar .top-avatar:active {
            transform: scale(0.9);
            transition: transform 0.1s;
        }

        /* ==================== المحتوى ==================== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px 80px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        /* ==================== شريط التنقل السفلي ==================== */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 6px 0 10px;
            background: #0d1117;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 20;
            backdrop-filter: blur(12px);
        }
        .bottom-nav .nav-item {
            color: var(--text-muted);
            text-align: center;
            cursor: pointer;
            font-size: 0.7em;
            padding: 6px 10px;
            border-radius: 14px;
            transition: all 0.25s;
            min-width: 52px;
            position: relative;
        }
        .bottom-nav .nav-item:hover {
            color: #c9d1d9;
            background: rgba(255, 255, 255, 0.04);
        }
        .bottom-nav .nav-item.active {
            color: var(--accent);
            font-weight: 700;
        }
        .bottom-nav .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--accent);
            border-radius: 3px;
            animation: activeTabIn 0.3s ease forwards;
        }
        @keyframes activeTabIn {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 20px;
                opacity: 1;
            }
        }
        .bottom-nav .nav-item span {
            display: block;
            font-size: 1.5em;
            line-height: 1.2;
            transition: transform 0.3s;
        }
        .bottom-nav .nav-item:active span {
            transform: scale(0.8);
            transition: transform 0.1s;
        }
        .bottom-nav .nav-item .badge {
            background: var(--red);
            color: #fff;
            font-size: 0.6em;
            padding: 2px 7px;
            border-radius: 20px;
            position: absolute;
            top: -2px;
            right: 2px;
            font-weight: 700;
            animation: badgeBounce 0.5s var(--transition-bounce);
            min-width: 18px;
            text-align: center;
        }
        @keyframes badgeBounce {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.3);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ==================== القصص ==================== */
        .stories-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 4px 14px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        .story {
            flex-shrink: 0;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .story::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: var(--gradient-ig);
            z-index: -1;
            animation: storyRing 2s linear infinite;
            opacity: 0.8;
        }
        @keyframes storyRing {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .story:hover {
            transform: scale(1.08);
        }
        .story:active {
            transform: scale(0.9);
            transition: transform 0.1s;
        }
        .story img {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-card);
            z-index: 1;
            transition: border-color 0.3s;
        }
        .story .username {
            position: absolute;
            bottom: -18px;
            font-size: 0.65em;
            color: var(--text-muted);
            white-space: nowrap;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .story .add-story {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            border: 2px solid var(--bg-card);
            transition: transform 0.2s;
        }
        .story:hover .add-story {
            transform: scale(1.2) rotate(90deg);
        }

        /* ==================== المنشورات ==================== */
        .post {
            background: var(--bg-elevated);
            border-radius: var(--radius);
            margin-bottom: 18px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: postIn 0.45s var(--transition-bounce) forwards;
            opacity: 0;
        }
        @keyframes postIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .post:hover {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .post-header {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .post-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .post-header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            transition: border-color 0.3s;
        }
        .post-header:hover img {
            border-color: var(--accent);
        }
        .post-header .username {
            font-weight: 700;
            color: #f0f6fc;
            flex: 1;
        }
        .post-header .time {
            font-size: 0.75em;
            color: var(--text-muted);
        }
        .post-header .post-options {
            cursor: pointer;
            font-size: 1.2em;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .post-header .post-options:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .post-media {
            position: relative;
            background: #000;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .post-media img,
        .post-media video {
            width: 100%;
            display: block;
            max-height: 500px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .post-media:active img,
        .post-media:active video {
            transform: scale(1.02);
        }
        .post-media .double-tap-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 80px;
            pointer-events: none;
            z-index: 10;
            animation: none;
            opacity: 0;
        }
        .post-media .double-tap-heart.active {
            animation: heartBurst 0.9s ease forwards;
        }
        @keyframes heartBurst {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            25% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }
            60% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.7;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }
        .post-actions {
            display: flex;
            gap: 14px;
            padding: 10px 14px 4px;
            font-size: 1.4em;
        }
        .post-actions span {
            cursor: pointer;
            transition: transform 0.25s;
            display: inline-block;
        }
        .post-actions span:hover {
            transform: scale(1.2);
        }
        .post-actions span:active {
            transform: scale(0.8);
            transition: transform 0.1s;
        }
        .post-actions .like-btn.liked {
            animation: likePop 0.4s var(--transition-bounce);
        }
        @keyframes likePop {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.4);
            }
            60% {
                transform: scale(0.8);
            }
            100% {
                transform: scale(1);
            }
        }
        .post-likes {
            padding: 2px 14px;
            font-weight: 700;
            font-size: 0.9em;
            color: #f0f6fc;
            transition: color 0.3s;
        }
        .post-caption {
            padding: 4px 14px 8px;
            font-size: 0.9em;
            line-height: 1.4;
        }
        .post-caption strong {
            color: #f0f6fc;
        }
        .post-comments {
            padding: 0 14px 10px;
            font-size: 0.82em;
        }
        .post-comments .comment {
            padding: 3px 0;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            animation: commentIn 0.3s ease forwards;
        }
        @keyframes commentIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .post-comments .comment.hidden {
            display: none;
        }
        .post-comments .comment strong {
            color: #f0f6fc;
        }
        .post-comments .comment-time {
            color: var(--text-muted);
            font-size: 0.7em;
        }
        .add-comment {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            border-top: 1px solid #21262d;
            margin-top: 4px;
        }
        .add-comment input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0f6fc;
            padding: 8px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            transition: background 0.2s;
        }
        .add-comment input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.04);
        }
        .add-comment button {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.8em;
        }
        .add-comment button:hover {
            background: #79c0ff;
            transform: scale(1.04);
        }
        .add-comment button:active {
            transform: scale(0.9);
            transition: transform 0.1s;
        }

        /* ==================== الريلز ==================== */
        .reel {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 16px;
            background: #000;
            animation: postIn 0.45s var(--transition-bounce) forwards;
            opacity: 0;
        }
        .reel video {
            width: 100%;
            display: block;
            max-height: 500px;
            object-fit: cover;
        }
        .reel-info {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 12px;
            color: #fff;
            backdrop-filter: blur(6px);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .reel-info:hover {
            transform: translateY(-3px);
        }
        .reel-info img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }
        .reel-user {
            font-weight: 700;
            font-size: 0.9em;
        }
        .reel-caption {
            font-size: 0.75em;
            opacity: 0.85;
        }

        /* ==================== المحادثات ==================== */
        .chat-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.25s;
            animation: slideInRight 0.35s ease forwards;
            opacity: 0;
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }

        /* ==================== النوافذ المنبثقة ==================== */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
            backdrop-filter: blur(4px);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-box {
            background: var(--bg-elevated);
            padding: 20px;
            border-radius: var(--radius);
            width: 92%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            animation: modalIn 0.35s var(--transition-bounce) forwards;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-close {
            float: left;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4em;
            cursor: pointer;

            padding: 4px 8px;

            transition: all 0.25s;
            font-size: 0.85em;
            flex: 1;
            text-align: center;

        .modal-btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .modal-btn.primary:hover {
            background: #79c0ff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .modal-btn.secondary {
            background: #21262d;
            color: #f0f6fc;
        }
        .modal-btn.danger {
            background: var(--red);
            color: #fff;
            border-color: var(--red);

        .modal-btn:active {
            transform: scale(0.93);

        }
        .modal-box textarea,
        .modal-box input[type="text"],
        .modal-box input[type="password"] {

        .modal-box input:focus {

        .modal-box h3 {

        /* ==================== قصة منبثقة ==================== */
        .story-modal {

        /* ==================== التوست ==================== */
        .toast-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            pointer-events: none;
            width: 90%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .toast {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            color: #f0f6fc;
            font-size: 0.9em;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastSlideIn 0.4s var(--transition-bounce) forwards;
        }
        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .toast.removing {
            animation: toastSlideOut 0.3s ease forwards;
        }
        @keyframes toastSlideOut {
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
        }
        .toast .toast-icon {
            font-size: 1.2em;
        }
        .toast.success {
            border-color: var(--green);
        }
        .toast.error {
            border-color: #da3633;
        }
        .toast.info {
            border-color: #1f6feb;
        }
        .toast.warning {
            border-color: #d2991d;
        }

        /* ==================== تحميل ==================== */
        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 30px 0;
            color: var(--text-muted);
            gap: 6px;
        }
        .loading-spinner span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: spinnerBounce 1.2s infinite;
        }
        .loading-spinner span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .loading-spinner span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes spinnerBounce {
            0%,
            80%,
            100% {
                transform: scale(0.5);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ==================== تأثير التموج ==================== */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s, opacity 0.5s;
            border-radius: inherit;
        }
        .ripple:active::after {
            transform: scale(2);
            opacity: 1;
            transition: transform 0s, opacity 0s;
        }

        /* ==================== هزاز للإجراءات المرفوضة ==================== */
        .shake-it {
            animation: shake 0.5s ease;
        }

        /* ==================== نص باهت ==================== */
        .text-muted {
            color: var(--text-muted);
        }
        .text-center {
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- شاشة المصادقة -->
        <div id="authScreen" class="screen active">
            <div class="auth-container">
                <div class="auth-box">
                    <h2>📸 <span>SecureGram</span></h2>
                    <div id="loginForm">
                        <label>👤 اسم المستخدم</label>
                        <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم" autocomplete="username">
                        <label>🔒 كلمة المرور</label>
                        <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" autocomplete="current-password">
                        <div class="error hidden" id="loginError"></div>
                        <button id="loginBtn" class="ripple">🚀 تسجيل الدخول</button>
                        <span class="link" id="showRegister">✨ ليس لديك حساب؟ سجل الآن</span>
                        <div class="admin-badge">
                            <span>💾</span> حفظ محلي آمن – بياناتك في متصفحك فقط
                        </div>
                    </div>
                    <div id="registerForm" style="display:none;">
                        <label>👤 اسم المستخدم</label>
                        <input type="text" id="regUsername" placeholder="اختر اسم مستخدم">
                        <label>🔒 كلمة المرور</label>
                        <input type="password" id="regPassword" placeholder="اختر كلمة مرور قوية">
                        <label>📝 السيرة الذاتية</label>
                        <input type="text" id="regBio" placeholder="اكتب شيئاً عنك (اختياري)">
                        <div class="error hidden" id="regError"></div>
                        <button id="registerBtn" class="ripple">🎉 إنشاء حساب</button>
                        <span class="link" id="showLogin">🔙 لديك حساب؟ سجل الدخول</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- الشاشة الرئيسية -->
        <div id="mainScreen" class="screen">
            <div class="top-bar" id="topBar">
                <div class="left-group">
                    <button class="back-btn hidden" id="backBtn">‹</button>
                    <h3>📸 <span>SecureGram</span></h3>
                </div>
                <img class="top-avatar" id="topAvatar" src="" alt="بروفايل" onclick="viewProfile(currentUser?.uuid)">
            </div>
            <div class="content" id="mainContent"></div>
            <div class="bottom-nav" id="bottomNav">
                <div class="nav-item active ripple" data-tab="home"><span>🏠</span>الرئيسية</div>
                <div class="nav-item ripple" data-tab="search"><span>🔍</span>بحث</div>
                <div class="nav-item ripple" data-tab="reels"><span>🎥</span>ريلز</div>
                <div class="nav-item ripple" data-tab="chats"><span>💬</span>محادثات</div>
                <div class="nav-item ripple" data-tab="profile"><span>👤</span>حسابي<span class="badge" style="display:none;">0</span></div>
                <div class="nav-item hidden ripple" data-tab="admin" id="adminTab"><span>⚙️</span>إدارة</div>
            </div>
            <div class="create-post hidden" id="createPostArea">
                <div class="post-input-row">
                    <label class="file-label ripple" id="postFileLabel">📎 اختيار ملف</label>
                    <input type="file" id="postMediaInput" accept="image/*,video/*">
                    <input type="text" id="postCaptionInput" placeholder="اكتب تعليقاً...">
                </div>
                <div class="post-options-row">
                    <label><input type="checkbox" id="postIsReel"> 🎬 ريلز</label>
                    <button class="publish-btn ripple" id="publishPostBtn">📤 نشر</button>
                </div>
            </div>
        </div>

        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script>
        (() => {
            'use strict';

            // ====================================================================
            //  1.  قاعدة البيانات (Dexie)
            // ====================================================================
            const db = new Dexie('SecureGramProV5');
            db.version(4).stores({
                accounts: 'uuid, username, createdAt, isAdmin',
                sessions: 'key',
                posts: 'id, authorUuid, timestamp, isReel',
                comments: 'id, postId, timestamp',
                likes: 'id, postId, userId',
                follows: 'id, followerUuid, followingUuid',
                stories: 'id, authorUuid, expiresAt',
                chats: 'id, participants, lastMessage, lastTime',
                messages: '++id, chatId, timestamp, senderUuid, read',
                reports: 'id, postId, reporterUuid, timestamp, resolved',
                notifications: '++id, targetUuid, timestamp, read'
            });

            let currentUser = null;
            let currentTab = 'home';
            let viewingProfileUuid = null;
            let activeChatPeerId = null;
            let peerConnections = {};
            let peer = null;
            let typingTimeout = null;
            let storyViewTimeout = null;
            let adminMode = false;

            // ====================================================================
            //  2.  دوال التشفير
            // ====================================================================
            async function generateAESKey() {
                return crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
            }
            async function exportKey(key) {
                const raw = await crypto.subtle.exportKey('raw', key);
                return Array.from(new Uint8Array(raw));
            }
            async function importKey(raw) {
                return crypto.subtle.importKey('raw', new Uint8Array(raw), { name: 'AES-GCM', length: 256 }, true, ['encrypt',
                    'decrypt'
                ]);
            }
            async function encryptData(key, text) {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(text));
                return { iv: Array.from(iv), data: Array.from(new Uint8Array(enc)) };
            }
            async function decryptData(key, obj) {
                const iv = new Uint8Array(obj.iv);
                const data = new Uint8Array(obj.data);
                const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
                return new TextDecoder().decode(dec);
            }
            async function hashPassword(pw) {
                const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
                return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            const ADMIN_UUID = 'admin-yaman-gadhat-001';
            const ADMIN_USERNAME = 'Yamangadhat';
            async function initAdmin() {
                const existing = await db.accounts.get(ADMIN_UUID);
                if (!existing) {
                    const passHash = await hashPassword('Yaman@2008');
                    await db.accounts.put({
                        uuid: ADMIN_UUID,
                        username: ADMIN_USERNAME,
                        passwordHash: passHash,
                        profilePic: '',
                        bio: '👑 المدير العام للنظام',
                        createdAt: Date.now(),
                        isAdmin: true
                    });
                } else if (!existing.isAdmin) {
                    await db.accounts.update(ADMIN_UUID, { isAdmin: true });
                }
            }

            async function saveSession(uuid) { await db.sessions.put({ key: 'currentUser', uuid }); }
            async function loadSession() { const s = await db.sessions.get('currentUser'); return s ? s.uuid : null; }
            async function clearSession() { await db.sessions.delete('currentUser'); }

            function generateId() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random()
                    .toString(36).slice(2, 7); }

            function timeAgo(ts) {
                const diff = Date.now() - ts;
                const sec = Math.floor(diff / 1000);
                if (sec < 60) return 'الآن';
                const min = Math.floor(sec / 60);
                if (min < 60) return min + ' د';
                const hr = Math.floor(min / 60);
                if (hr < 24) return hr + ' س';
                const day = Math.floor(hr / 24);
                if (day < 30) return day + ' ي';
                const mon = Math.floor(day / 30);
                if (mon < 12) return mon + ' ش';
                return Math.floor(mon / 12) + ' س';
            }

            function getFileType(file) {
                if (!file) return null;
                if (file.type.startsWith('image/')) return 'image';
                if (file.type.startsWith('video/')) return 'video';
                return null;
            }

            function readFileAsDataURL(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            async function compressImage(dataUrl, maxWidth = 800, quality = 0.7) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width,
                            h = img.height;
                        if (w > maxWidth) { h = (maxWidth / w) * h;
                            w = maxWidth; }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                    img.src = dataUrl;
                });
            }

            function showToast(message, type = 'info', duration = 3000) {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
                toast.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span> ${message}`;
                container.appendChild(toast);
                const remove = () => {
                    toast.classList.add('removing');
                    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
                };
                toast.onclick = remove;
                setTimeout(remove, duration);
            }

            // ====================================================================
            //  3.  المتابعة والإعجابات
            // ====================================================================
            async function isFollowing(targetUuid) {
                return !!(await db.follows.where({ followerUuid: currentUser.uuid, followingUuid: targetUuid }).first());
            }
            async function getFollowers(uuid) { return await db.follows.where('followingUuid').equals(uuid).toArray(); }
            async function getFollowing(uuid) { return await db.follows.where('followerUuid').equals(uuid).toArray(); }

            async function followUser(targetUuid) {
                if (targetUuid === currentUser.uuid) return;
                const exists = await db.follows.where({ followerUuid: currentUser.uuid, followingUuid: targetUuid })
                .first();
                if (exists) {
                    await db.follows.delete(exists.id);
                    showToast('تم إلغاء متابعة المستخدم', 'info');
                } else {
                    await db.follows.put({ id: generateId(), followerUuid: currentUser.uuid, followingUuid: targetUuid,
                        timestamp: Date.now() });
                    showToast('تمت المتابعة ✅', 'success');
                    await addNotification(targetUuid, `${currentUser.username} يتابعك الآن`, 'follow');
                }
                if (viewingProfileUuid === targetUuid) await renderProfile(targetUuid);
                renderTab(currentTab);
            }

            async function addNotification(targetUuid, message, type = 'general') {
                await db.notifications.put({
                    id: generateId(),
                    targetUuid,
                    message,
                    type,
                    timestamp: Date.now(),
                    read: false,
                    fromUuid: currentUser.uuid,
                    fromUsername: currentUser.username
                });
                await updateUnreadCounts();
                if (Notification.permission === 'granted') {
                    new Notification('SecureGram', { body: message, icon: '📸' });
                }
            }
            async function getUnreadCount(uuid) {
                return await db.notifications.where({ targetUuid: uuid, read: false }).count();
            }
            async function updateUnreadCounts() {
                if (!currentUser) return;
                const count = await getUnreadCount(currentUser.uuid);
                const badge = document.querySelector('.nav-item[data-tab="profile"] .badge');
                if (badge) {
                    if (count > 0) { badge.textContent = count;
                        badge.style.display = 'inline'; } else { badge.style.display = 'none'; }
                }
            }

            // ====================================================================
            //  4.  التنقل
            // ====================================================================
            const mainContent = document.getElementById('mainContent');
            const backBtn = document.getElementById('backBtn');
            const topAvatar = document.getElementById('topAvatar');
            const createPostArea = document.getElementById('createPostArea');
            const adminTab = document.getElementById('adminTab');

            function showBackButton(show = true) { backBtn.classList.toggle('hidden', !show); }

            backBtn.onclick = () => {
                if (viewingProfileUuid) { viewingProfileUuid = null;
                    renderTab(currentTab);
                    showBackButton(false); } else if (activeChatPeerId) { activeChatPeerId = null;
                    renderTab('chats');
                    showBackButton(false); }
            };

            function switchTab(tab) {
                currentTab = tab;
                viewingProfileUuid = null;
                activeChatPeerId = null;
                showBackButton(false);
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                const el = document.querySelector(`[data-tab="${tab}"]`);
                if (el) el.classList.add('active');
                renderTab(tab);
            }

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const tab = item.dataset.tab;
                    if (tab === 'admin' && !adminMode) { showToast('🔐 ليس لديك صلاحية الدخول إلى لوحة الإدارة',
                            'error'); return; }
                    switchTab(tab);
                });
            });

            async function renderTab(tab) {
                createPostArea.classList.add('hidden');
                mainContent.innerHTML = '';
                if (currentUser && currentUser.isAdmin) adminTab.classList.remove('hidden');
                else adminTab.classList.add('hidden');

                switch (tab) {
                    case 'home':
                        await renderHome();
                        createPostArea.classList.remove('hidden');
                        break;
                    case 'search':
                        renderSearch();
                        break;
                    case 'reels':
                        await renderReels();
                        createPostArea.classList.remove('hidden');
                        break;
                    case 'chats':
                        await renderChatList();
                        break;
                    case 'profile':
                        await renderProfile(currentUser.uuid);
                        break;
                    case 'admin':
                        await renderAdminPanel();
                        break;
                }
                if (currentUser) topAvatar.src = currentUser.profilePic || '';
                await updateUnreadCounts();
            }

            // ====================================================================
            //  5.  الصفحة الرئيسية
            // ====================================================================
            async function renderHome() {
                const storiesDiv = document.createElement('div');
                storiesDiv.className = 'stories-container';

                const myStoryBtn = document.createElement('div');
                myStoryBtn.className = 'story';
                myStoryBtn.innerHTML = `<img src="${currentUser.profilePic||''}" alt="قصتي"><span class="username">قصتي</span><span class="add-story">+</span>`;
                myStoryBtn.onclick = () => createStory();
                storiesDiv.appendChild(myStoryBtn);

                const followingList = await db.follows.where('followerUuid').equals(currentUser.uuid).toArray();
                const followedUuids = followingList.map(f => f.followingUuid);
                const allUsers = await db.accounts.toArray();
                const stories = await db.stories.where('expiresAt').above(Date.now()).toArray();

                for (let u of allUsers.filter(u => followedUuids.includes(u.uuid) || u.uuid === currentUser.uuid)) {
                    const userStories = stories.filter(s => s.authorUuid === u.uuid);
                    if (userStories.length > 0 && u.uuid !== currentUser.uuid) {
                        const sDiv = document.createElement('div');
                        sDiv.className = 'story';
                        sDiv.innerHTML =
                            `<img src="${u.profilePic||''}" alt=""><span class="username">${u.username}</span>`;
                        sDiv.onclick = () => viewStory(userStories, 0);
                        storiesDiv.appendChild(sDiv);
                    }
                }
                mainContent.appendChild(storiesDiv);

                const allPosts = await db.posts.orderBy('timestamp').reverse().toArray();
                const timelinePosts = allPosts.filter(p => p.authorUuid === currentUser.uuid || followedUuids.includes(p
                    .authorUuid));

                if (timelinePosts.length === 0) {
                    const empty = document.createElement('p');
                    empty.style.cssText = 'text-align:center;color:#8b949e;padding:30px 0;';
                    empty.textContent = '📭 لا توجد منشورات. تابع مستخدمين لرؤية محتواهم!';
                    mainContent.appendChild(empty);
                } else {
                    for (let i = 0; i < timelinePosts.length; i++) {
                        const el = await createPostElement(timelinePosts[i]);
                        el.style.animationDelay = `${i*0.06}s`;
                        mainContent.appendChild(el);
                    }
                }
            }

            // ====================================================================
            //  6.  عنصر المنشور (مع تأثيرات)
            // ====================================================================
            async function createPostElement(post) {
                const div = document.createElement('div');
                div.className = 'post';
                div.dataset.postid = post.id;

                const author = await db.accounts.get(post.authorUuid) || { username: 'مستخدم', profilePic: '' };
                const likes = await db.likes.where('postId').equals(post.id).toArray();
                const likedByMe = likes.some(l => l.userId === currentUser.uuid);
                const comments = await db.comments.where('postId').equals(post.id).sortBy('timestamp');

                let html = `
            <div class="post-header" data-uuid="${author.uuid}">
              <img src="${author.profilePic||''}" alt="">
              <span class="username">${author.username}</span>
              <span class="time">${timeAgo(post.timestamp)}</span>
              <span class="post-options" data-postid="${post.id}">⋯</span>
            </div>
            <div class="post-media" data-postid="${post.id}">
              ${post.mediaType==='image'?`<img src="${post.mediaUrl}" alt="منشور" loading="lazy">`:`<video src="${post.mediaUrl}" controls preload="metadata" playsinline></video>`}
              <span class="double-tap-heart">❤️</span>
            </div>
            <div class="post-actions">
              <span class="like-btn ${likedByMe?'liked':''}" data-postid="${post.id}">${likedByMe?'❤️':'🤍'}</span>
              <span class="comment-toggle" data-postid="${post.id}">💬</span>
              <span class="share-btn" data-postid="${post.id}">🔗</span>
            </div>
            <div class="post-likes" data-postid="${post.id}">${likes.length} ${likes.length===1?'إعجاب':'إعجابات'}</div>
            <div class="post-caption"><strong>${author.username}</strong> ${post.caption||''}</div>
            <div class="post-comments" id="comments-${post.id}">
              ${comments.slice(0,3).map(c=>`<div class="comment"><strong>${c.authorUsername}</strong> <span class="comment-text">${c.text}</span> <span class="comment-time">${timeAgo(c.timestamp)}</span></div>`).join('')}
              ${comments.length>3?`<div class="comment text-muted" style="font-size:0.8em;cursor:pointer;" id="showMore-${post.id}">عرض ${comments.length-3} تعليقات أخرى</div>`:''}
              ${comments.slice(3).map(c=>`<div class="comment hidden"><strong>${c.authorUsername}</strong> <span class="comment-text">${c.text}</span> <span class="comment-time">${timeAgo(c.timestamp)}</span></div>`).join('')}
              <div class="add-comment">
                <input type="text" placeholder="أضف تعليق..." data-postid="${post.id}">
                <button data-postid="${post.id}">نشر</button>
              </div>
            </div>`;
                div.innerHTML = html;

                // النقر على الهيدر
                div.querySelector('.post-header').onclick = () => viewProfile(author.uuid);

                // زر الإعجاب
                const likeBtn = div.querySelector('.like-btn');
                likeBtn.onclick = async (e) => {
                    e.stopPropagation();
                    await toggleLike(post, likeBtn, div);
                };

                // النقر المزدوج على الوسائط
                const mediaEl = div.querySelector('.post-media');
                let tapTimer = null;
                mediaEl.addEventListener('click', (e) => {
                    if (e.target.closest('.double-tap-heart')) return;
                    if (tapTimer) {
                        // double tap
                        clearTimeout(tapTimer);
                        tapTimer = null;
                        const heart = mediaEl.querySelector('.double-tap-heart');
                        heart.classList.remove('active');
                        void heart.offsetWidth;
                        heart.classList.add('active');
                        if (!likedByMe) toggleLike(post, likeBtn, div);
                    } else {
                        tapTimer = setTimeout(() => { tapTimer = null; }, 300);
                    }
                });

                // عرض المزيد من التعليقات
                const showMore = div.querySelector(`#showMore-${post.id}`);
                if (showMore) {
                    showMore.onclick = () => {
                        div.querySelectorAll('.post-comments .comment.hidden').forEach(c => c.classList
                            .remove('hidden'));
                        showMore.remove();
                    };
                }

                // إضافة تعليق
                div.querySelectorAll('.add-comment button').forEach(btn => {
                    btn.onclick = async () => {
                        const input = btn.parentElement.querySelector('input');
                        const text = input.value.trim();
                        if (!text) return;
                        const postId = btn.dataset.postid;
                        await db.comments.put({ id: generateId(), postId, authorUuid: currentUser.uuid,
                            authorUsername: currentUser.username, text, timestamp: Date.now() });
                        if (post.authorUuid !== currentUser.uuid) {
                            await addNotification(post.authorUuid,
                                `${currentUser.username} علق: "${text.slice(0,30)}${text.length>30?'…':''}"`,
                                'comment');
                        }
                        renderTab(currentTab);
                    };
                });

                // خيارات المنشور
                div.querySelector('.post-options').onclick = (e) => {
                    e.stopPropagation();
                    if (post.authorUuid === currentUser.uuid || currentUser.isAdmin) {
                        if (confirm('هل تريد حذف هذا المنشور؟')) deletePost(post.id);
                    } else {
                        if (confirm('هل تريد الإبلاغ عن هذا المنشور؟')) reportPost(post.id);
                    }
                };

                // مشاركة
                div.querySelector('.share-btn').onclick = (e) => {
                    e.stopPropagation();
                    const url = window.location.href + `?post=${post.id}`;
                    if (navigator.share) navigator.share({ title: 'منشور من SecureGram', url });
                    else navigator.clipboard.writeText(url).then(() => showToast('📋 تم نسخ الرابط', 'success'))
                        .catch(() => showToast('🔗 الرابط: ' + url, 'info', 5000));
                };

                div.querySelector('.comment-toggle').onclick = (e) => {
                    e.stopPropagation();
                    const cd = div.querySelector('.post-comments');
                    cd.scrollIntoView({ behavior: 'smooth' });
                };

                return div;
            }

            async function toggleLike(post, likeBtn, postDiv) {
                const postId = post.id;
                const existing = await db.likes.where({ postId, userId: currentUser.uuid }).first();
                if (existing) {
                    await db.likes.delete(existing.id);
                    likeBtn.classList.remove('liked');
                    likeBtn.textContent = '🤍';
                } else {
                    await db.likes.put({ id: generateId(), postId, userId: currentUser.uuid, timestamp: Date.now() });
                    likeBtn.classList.add('liked');
                    likeBtn.textContent = '❤️';
                    likeBtn.classList.remove('liked');
                    void likeBtn.offsetWidth;
                    likeBtn.classList.add('liked');
                    if (post.authorUuid !== currentUser.uuid) {
                        await addNotification(post.authorUuid, `${currentUser.username} أعجب بمنشورك 💖`, 'like');
                    }
                }
                const newLikes = await db.likes.where('postId').equals(postId).toArray();
                const likesEl = postDiv.querySelector('.post-likes');
                if (likesEl) likesEl.textContent = `${newLikes.length} ${newLikes.length===1?'إعجاب':'إعجابات'}`;
            }

            async function deletePost(postId) {
                await db.posts.delete(postId);
                await db.comments.where('postId').equals(postId).delete();
                await db.likes.where('postId').equals(postId).delete();
                showToast('🗑️ تم حذف المنشور', 'success');
                renderTab(currentTab);
            }

            async function createStory() {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'image/*,video/*';
                inp.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        let dataUrl = await readFileAsDataURL(file);
                        if (file.type.startsWith('image/')) dataUrl = await compressImage(dataUrl, 600, 0.6);
                        await db.stories.put({ id: generateId(), authorUuid: currentUser.uuid, mediaUrl: dataUrl,
                            mediaType: getFileType(file), expiresAt: Date.now() + 86400000, timestamp: Date
                            .now() });
                        showToast('📸 تم نشر القصة', 'success');
                        renderTab('home');
                    } catch (err) { showToast('❌ حدث خطأ: ' + err.message, 'error'); }
                };
                inp.click();
            }

            function viewStory(stories, index) {
                if (!stories || index >= stories.length) return;
                const story = stories[index];
                const modal = document.createElement('div');
                modal.className = 'story-modal';

                const progressDiv = document.createElement('div');
                progressDiv.className = 'story-progress';
                progressDiv.innerHTML = '<div class="story-progress-bar"></div>';
                modal.appendChild(progressDiv);

                const closeBtn = document.createElement('button');
                closeBtn.className = 'close-story';
                closeBtn.textContent = '✕';
                closeBtn.onclick = () => { if (storyViewTimeout) clearTimeout(storyViewTimeout);
                    modal.remove(); };
                modal.appendChild(closeBtn);

                const userInfo = document.createElement('div');
                userInfo.className = 'story-user';
                userInfo.innerHTML = `<img src="${currentUser.profilePic||''}" alt=""> ${currentUser.username}`;
                modal.appendChild(userInfo);

                const content = document.createElement('div');
                content.className = 'story-content';
                content.innerHTML = story.mediaType === 'image' ?
                    `<img src="${story.mediaUrl}" alt="قصة">` :
                    `<video src="${story.mediaUrl}" controls autoplay playsinline></video>`;
                modal.appendChild(content);

                document.getElementById('app').appendChild(modal);

                if (storyViewTimeout) clearTimeout(storyViewTimeout);
                storyViewTimeout = setTimeout(() => {
                    if (modal.parentNode) modal.remove();
                    if (index + 1 < stories.length) viewStory(stories, index + 1);
                }, 5000);

                modal.addEventListener('click', (e) => {
                    if (e.target === modal || e.target.closest('.story-content') && !e.target.closest('video')) {
                        if (storyViewTimeout) clearTimeout(storyViewTimeout);
                        modal.remove();
                        if (index + 1 < stories.length) viewStory(stories, index + 1);
                    }
                });
            }
