<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action=manipulation">
    <title>SecureGram – الجرام الذهبي (نظام نشر متطور)</title>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js">
    </script>
    <script src="https://unpkg.com/peerjs@1.5.0/dist/peerjs.min.js">
    </script>
    <style>
        :root {
            --bg-deep: #080c14;
            --bg-card: #111827;
            --bg-glass: rgba(22, 27, 34, 0.75);
            --bg-elevated: #1a1f2e;
            --border: #252b3b;
            --border-glow: rgba(88, 166, 255, 0.25);
            --accent: #58a6ff;
            --accent-2: #c084fc;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --green: #238636;
            --green-glow: rgba(35, 134, 54, 0.5);
            --red: #f85149;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --gradient-ig: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --gradient-gold: linear-gradient(135deg, #f59e0b, #fbbf24, #fcd34d);
            --gradient-blue: linear-gradient(135deg, #3b82f6, #6366f1, #8b5cf6);
            --radius: 18px;
            --radius-sm: 12px;
            --shadow-glow: 0 0 80px rgba(31, 111, 235, 0.3);
            --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.5);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --backdrop-blur: blur(16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #020617;
            font-family: 'Segoe UI', 'SF Pro Display', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(88, 166, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(192, 132, 252, 0.05) 0%, transparent 60%);
        }
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }

        #app {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: var(--bg-glass);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            box-shadow: var(--shadow-glow), var(--shadow-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            border-radius: 0;
            border: var(--glass-border);
        }
        @media(min-width:520px) {
            #app {
                border-radius: 30px;
                height: 94vh;
                max-height: 860px;
                margin: 0 8px;
            }
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--bg-glass);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            z-index: 1;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .screen.active {
            display: flex;
            z-index: 10;
            animation: screenSlideIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes screenSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
                filter: blur(4px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* ========== المصادقة ========== */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(ellipse at 50% 0%, #1a2040 0%, #080c14 80%);
            animation: bgBreath 8s ease-in-out infinite;
        }
        @keyframes bgBreath {
            0%,
            100% {
                background: radial-gradient(ellipse at 50% 0%, #1a2040 0%, #080c14 80%);
            }
            50% {
                background: radial-gradient(ellipse at 50% 0%, #1e2a50 0%, #080c14 80%);
            }
        }
        .auth-box {
            width: 100%;
            max-width: 360px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 36px 28px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: authFloatIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes authFloatIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.85);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        .auth-box h2 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 28px;
            font-size: 2em;
            letter-spacing: -0.5px;
        }
        .auth-box h2 span {
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            animation: shimmerText 2.5s ease-in-out infinite;
            background-size: 200% 200%;
        }
        @keyframes shimmerText {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .auth-box label {
            font-size: 0.8em;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .auth-box input {
            width: 100%;
            padding: 13px 16px;
            margin-bottom: 16px;
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: #f0f6fc;
            font-size: 0.95em;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        .auth-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow), 0 0 20px rgba(88, 166, 255, 0.15);
            transform: translateY(-2px);
        }
        .auth-box button {
            width: 100%;
            padding: 14px;
            background: var(--gradient-blue);
            border: none;
            color: #fff;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            font-size: 1em;
            margin-bottom: 10px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }
        .auth-box button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.6);
        }
        .auth-box button:active {
            transform: scale(0.95);
            transition: transform 0.1s;
        }
        .auth-box button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .auth-box button:hover::after {
            transform: translateX(100%);
        }
        .auth-box .link {
            color: var(--accent);
            text-align: center;
            cursor: pointer;
            display: block;
            margin-top: 14px;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .auth-box .link:hover {
            color: #93c5fd;
            transform: translateY(-1px);
            text-shadow: 0 0 12px var(--accent-glow);
        }
        .error {
            color: var(--red);
            margin-bottom: 12px;
            text-align: center;
            font-size: 0.85em;
            background: rgba(248, 81, 73, 0.1);
            padding: 8px 14px;
            border-radius: 10px;
            animation: shake 0.5s ease;
            border: 1px solid rgba(248, 81, 73, 0.2);
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-6px);
            }
            40% {
                transform: translateX(6px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(4px);
            }
        }
        .admin-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.7em;
            color: var(--text-muted);
            margin-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 16px;
        }
        .admin-badge span {
            background: #7c3aed;
            padding: 3px 12px;
            border-radius: 20px;
            color: #fff;
            font-weight: 700;
            animation: badgeGlow 2s ease-in-out infinite;
            box-shadow: 0 0 16px rgba(124, 58, 237, 0.5);
        }
        @keyframes badgeGlow {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(124, 58, 237, 0.4);
            }
            50% {
                box-shadow: 0 0 24px rgba(124, 58, 237, 0.8);
            }
        }

        /* ========== الشريط العلوي ========== */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            justify-content: space-between;
            background: rgba(8, 12, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-height: 58px;
            flex-shrink: 0;
            z-index: 20;
        }
        .top-bar h3 {
            color: var(--accent);
            font-size: 1.25em;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .top-bar h3 span {
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-bar .left-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-bar .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.8em;
            cursor: pointer;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .top-bar .back-btn:hover {
            transform: scale(1.15);
            background: rgba(88, 166, 255, 0.12);
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .top-bar .back-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(20px);
        }
        .top-bar .top-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            background: #21262d;
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .top-bar .top-avatar:hover {
            border-color: #93c5fd;
            transform: scale(1.1);
            box-shadow: 0 0 24px rgba(88, 166, 255, 0.6);
        }
        .top-bar .top-avatar:active {
            transform: scale(0.85);
            transition: transform 0.1s;
        }

        /* ========== المحتوى ========== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 80px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        /* ========== شريط التنقل ========== */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            background: rgba(8, 12, 20, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            z-index: 20;
        }
        .bottom-nav .nav-item {
            color: var(--text-muted);
            text-align: center;
            cursor: pointer;
            font-size: 0.7em;
            padding: 6px 12px;
            border-radius: 16px;
            transition: all 0.3s;
            min-width: 52px;
            position: relative;
        }
        .bottom-nav .nav-item:hover {
            color: #e6edf3;
            background: rgba(255, 255, 255, 0.04);
        }
        .bottom-nav .nav-item.active {
            color: var(--accent);
            font-weight: 700;
        }
        .bottom-nav .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 3px;
            background: var(--gradient-blue);
            border-radius: 3px;
            animation: activeBar 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        @keyframes activeBar {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 22px;
                opacity: 1;
            }
        }
        .bottom-nav .nav-item span {
            display: block;
            font-size: 1.5em;
            line-height: 1.2;
            transition: transform 0.3s;
        }
        .bottom-nav .nav-item:active span {
            transform: scale(0.75);
            transition: transform 0.1s;
        }
        .bottom-nav .nav-item .badge {
            background: var(--red);
            color: #fff;
            font-size: 0.6em;
            padding: 2px 7px;
            border-radius: 20px;
            position: absolute;
            top: -2px;
            right: 2px;
            font-weight: 700;
            animation: badgePop 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            min-width: 18px;
            text-align: center;
            box-shadow: 0 0 10px rgba(248, 81, 73, 0.5);
        }
        @keyframes badgePop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            60% {
                transform: scale(1.3);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ========== القصص ========== */
        .stories-container {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 12px 4px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar {
            display: none;
        }
        .story {
            flex-shrink: 0;
            width: 74px;
            height: 74px;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .story::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: var(--gradient-ig);
            z-index: -1;
            animation: storyRotate 3s linear infinite;
            opacity: 0.9;
            filter: blur(1px);
        }
        @keyframes storyRotate {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.04);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }
        .story:hover {
            transform: scale(1.1);
            filter: brightness(1.15);
        }
        .story:active {
            transform: scale(0.85);
            transition: transform 0.1s;
        }
        .story img {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-card);
            z-index: 1;
            transition: all 0.3s;
        }
        .story .username {
            position: absolute;
            bottom: -20px;
            font-size: 0.65em;
            color: var(--text-muted);
            white-space: nowrap;
            text-align: center;
            width: 100%;
        }
        .story .add-story {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--gradient-blue);
            color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            border: 3px solid var(--bg-card);
            transition: all 0.3s;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
        }
        .story:hover .add-story {
            transform: scale(1.3) rotate(90deg);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.9);
        }

        /* ========== المنشورات ========== */
        .post {
            background: var(--bg-glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: var(--radius);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            animation: postRise 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        @keyframes postRise {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .post:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 30px rgba(88, 166, 255, 0.08);
            transform: translateY(-2px);
        }
        .post-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .post-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .post-header img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        .post-header:hover img {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .post-header .username {
            font-weight: 700;
            color: #f0f6fc;
            flex: 1;
            font-size: 0.9em;
        }
        .post-header .time {
            font-size: 0.7em;
            color: var(--text-muted);
        }
        .post-header .post-options {
            cursor: pointer;
            font-size: 1.2em;
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .post-header .post-options:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .post-media {
            position: relative;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }
        .post-media img,
        .post-media video {
            width: 100%;
            display: block;
            max-height: 520px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .post-media:active img,
        .post-media:active video {
            transform: scale(1.03);
        }
        .post-media .double-tap-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 90px;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.7));
        }
        .post-media .double-tap-heart.active {
            animation: heartExplosion 1s ease forwards;
        }
        @keyframes heartExplosion {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-20deg);
                opacity: 1;
            }
            30% {
                transform: translate(-50%, -50%) scale(1.4) rotate(5deg);
                opacity: 1;
            }
            70% {
                transform: translate(-50%, -50%) scale(0.8) rotate(0deg);
                opacity: 0.6;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.8) rotate(15deg);
                opacity: 0;
            }
        }
        .post-actions {
            display: flex;
            gap: 16px;
            padding: 12px 16px 6px;
            font-size: 1.45em;
        }
        .post-actions span {
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }
        .post-actions span:hover {
            transform: scale(1.25);
            filter: drop-shadow(0 0 6px var(--accent-glow));
        }
        .post-actions span:active {
            transform: scale(0.7);
            transition: transform 0.1s;
        }
        .post-actions .like-btn.liked {
            animation: likeHeartBeat 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            filter: drop-shadow(0 0 10px rgba(255, 0, 100, 0.6));
        }
        @keyframes likeHeartBeat {
            0% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.5);
            }
            50% {
                transform: scale(0.7);
            }
            75% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
        .post-likes {
            padding: 2px 16px;
            font-weight: 700;
            font-size: 0.9em;
            color: #f0f6fc;
        }
        .post-caption {
            padding: 6px 16px 10px;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .post-caption strong {
            color: #f0f6fc;
        }
        .post-comments {
            padding: 0 16px 12px;
            font-size: 0.82em;
        }
        .post-comments .comment {
            padding: 4px 0;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            animation: commentSlide 0.35s ease forwards;
        }
        @keyframes commentSlide {
            from {
                opacity: 0;
                transform: translateX(-15px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .post-comments .comment.hidden {
            display: none;
        }
        .post-comments .comment strong {
            color: #f0f6fc;
        }
        .post-comments .comment-time {
            color: var(--text-muted);
            font-size: 0.7em;
        }
        .add-comment {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 6px;
        }
        .add-comment input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0f6fc;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            transition: background 0.3s;
        }
        .add-comment input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.04);
        }
        .add-comment button {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 7px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8em;
            transition: all 0.3s;
        }
        .add-comment button:hover {
            background: #93c5fd;
            transform: scale(1.05);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* ========== منطقة النشر (محسنة) ========== */
        .create-post {
            padding: 14px 16px;
            background: rgba(8, 12, 20, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            z-index: 15;
            animation: slideUpSoft 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes slideUpSoft {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .create-post.hidden {
            display: none;
        }
        .post-preview {
            position: relative;
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: 10px;
            max-height: 160px;
            background: #000;
            display: none;
            animation: previewIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes previewIn {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 160px;
            }
        }
        .post-preview.active {
            display: block;
        }
        .post-preview img,
        .post-preview video {
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            display: block;
        }
        .post-preview .remove-preview {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 5;
        }
        .post-preview .remove-preview:hover {
            background: var(--red);
            transform: scale(1.1);
        }
        .post-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .file-label {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 16px;
            border-radius: 22px;
            cursor: pointer;
            font-size: 0.85em;
            color: #f0f6fc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            white-space: nowrap;
            font-weight: 600;
        }
        .file-label:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
            transform: translateY(-2px);
        }
        .create-post input[type="file"] {
            display: none;
        }
        .create-post input[type="text"] {
            flex: 1;
            min-width: 140px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            color: #f0f6fc;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .create-post input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: rgba(255, 255, 255, 0.06);
        }
        .post-options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px;
        }
        .post-options-row label {
            font-size: 0.8em;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }
        .post-options-row label:hover {
            color: #f0f6fc;
        }
        .publish-btn {
            background: var(--gradient-blue);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 22px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            font-size: 0.9em;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
            position: relative;
            overflow: hidden;
        }
        .publish-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(59, 130, 246, 0.7);
        }
        .publish-btn:active {
            transform: scale(0.9);
            transition: transform 0.1s;
        }
        .publish-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        .publish-btn:hover::after {
            transform: translateX(100%);
        }

        /* ========== تأثير النشر (سباركل) ========== */
        .sparkle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
        }
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleFly 1s ease-out forwards;
        }
        @keyframes sparkleFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }

        /* ========== الريلز ========== */
        .reel {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 18px;
            background: #000;
            animation: postRise 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .reel video {
            width: 100%;
            display: block;
            max-height: 520px;
            object-fit: cover;
        }
        .reel-info {
            position: absolute;
            bottom: 14px;
            left: 14px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 10px 14px;
            border-radius: 14px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .reel-info:hover {
            transform: translateY(-4px);
            background: rgba(0, 0, 0, 0.8);
        }
        .reel-info img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        /* ========== المحادثات ========== */
        .chat-list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s;
            animation: slideInRight 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .chat-list-item:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateX(-4px);
        }
        .chat-list-item img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .chat-list-item .chat-info {
            flex: 1;
        }
        .chat-list-item .name {
            font-weight: 700;
            color: #f0f6fc;
        }
        .chat-list-item .last-msg {
            font-size: 0.8em;
            color: var(--text-muted);
        }
        .chat-list-item .chat-time {
            font-size: 0.7em;
            color: var(--text-muted);
        }
        .chat-list-item .unread {
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            min-width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: 700;
            animation: badgePop 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 75%;
            padding: 11px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            line-height: 1.5;
            word-break: break-word;
            animation: msgBubble 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            position: relative;
        }
        @keyframes msgBubble {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .msg.sent {
            align-self: flex-end;
            background: var(--gradient-blue);
            color: #fff;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .msg.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            color: #f0f6fc;
            border-bottom-left-radius: 6px;
        }
        .msg .media-wrap img,
        .msg .media-wrap video {
            max-width: 200px;
            border-radius: 12px;
            margin-bottom: 6px;
        }
        .msg-time {
            font-size: 0.65em;
            opacity: 0.7;
            display: block;
            margin-top: 4px;
        }
        .msg-status {
            font-size: 0.7em;
            margin-right: 4px;
            display: inline-block;
        }
        .msg-status.read {
            color: #93c5fd;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
            background: rgba(8, 12, 20, 0.85);
            backdrop-filter: blur(12px);
        }
        .chat-input-area input {
            flex: 1;
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            color: #f0f6fc;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .chat-input-area button {
            background: var(--gradient-blue);
            border: none;
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        .chat-input-area button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 22px rgba(59, 130, 246, 0.6);
        }
        .chat-input-area .attach-btn {
            background: rgba(255, 255, 255, 0.06);
            font-size: 1.3em;
            box-shadow: none;
        }

        .connection-status {
            text-align: center;
            font-size: 0.7em;
            padding: 5px 0;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
        }
        .connection-status.online {
            color: #3fb950;
        }
        .connection-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 5px;
            background: #8b949e;
        }
        .connection-status.online .dot {
            background: #3fb950;
            animation: dotPing 1.5s infinite;
            box-shadow: 0 0 8px rgba(63, 185, 80, 0.6);
        }
        @keyframes dotPing {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.5);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(63, 185, 80, 0);
            }
        }

        /* ========== البروفايل ========== */
        .profile-header {
            text-align: center;
            padding: 28px 16px 18px;
            animation: fadeInUpSoft 0.55s ease forwards;
        }
        @keyframes fadeInUpSoft {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transition: all 0.4s;
            cursor: pointer;
        }
        .profile-avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 45px rgba(88, 166, 255, 0.7);
        }
        .profile-name {
            font-size: 1.4em;
            font-weight: 800;
            color: #f0f6fc;
            margin-top: 12px;
        }
        .profile-bio {
            font-size: 0.85em;
            color: var(--text-muted);
            margin: 8px 0;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin: 16px 0;
        }
        .profile-stats .stat {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 14px;
            border-radius: 12px;
        }
        .profile-stats .stat:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.03);
        }
        .profile-stats .stat strong {
            display: block;
            font-size: 1.3em;
            color: #f0f6fc;
        }
        .profile-stats .stat span {
            font-size: 0.75em;
            color: var(--text-muted);
        }
        .profile-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .profile-actions button {
            padding: 9px 22px;
            border-radius: 22px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: all 0.3s;
            font-size: 0.85em;
            background: rgba(255, 255, 255, 0.04);
            color: #f0f6fc;
            backdrop-filter: blur(4px);
        }
        .profile-actions button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        .profile-actions .follow-btn {
            background: var(--gradient-blue);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
        }
        .profile-actions .follow-btn.following {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
            color: #f0f6fc;
            box-shadow: none;
        }
        .profile-tabs {
            display: flex;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 10px;
        }
        .profile-tabs .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            font-size: 0.85em;
            color: var(--text-muted);
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .profile-tabs .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 700;
        }
        .profile-tabs .tab:hover {
            color: #f0f6fc;
            background: rgba(255, 255, 255, 0.02);
        }

        /* ========== النوافذ المنبثقة ========== */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-box {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: var(--radius);
            width: 92%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8);
            animation: modalPop 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(40px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-close {
            float: left;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
            padding: 6px 10px;
            border-radius: 50%;
        }
        .modal-close:hover {
            color: #fff;
            transform: rotate(90deg);
            background: rgba(255, 255, 255, 0.06);
        }
        .modal-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal-btn {
            padding: 11px 20px;
            border-radius: 22px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 700;
            transition: all 0.3s;
            font-size: 0.85em;
            flex: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            color: #f0f6fc;
        }
        .modal-btn.primary {
            background: var(--gradient-blue);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
        }
        .modal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(59, 130, 246, 0.7);
        }
        .modal-btn.danger {
            background: var(--red);
            color: #fff;
            border-color: transparent;
        }

        /* ========== التوست ========== */
        .toast-container {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            pointer-events: none;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 14px 20px;
            color: #f0f6fc;
            font-size: 0.9em;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastSlide 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateY(35px) scale(0.85);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .toast.removing {
            animation: toastOut 0.35s ease forwards;
        }
        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateY(-25px) scale(0.85);
            }
        }
        .toast.success {
            border-color: rgba(35, 134, 54, 0.5);
            box-shadow: 0 8px 30px rgba(35, 134, 54, 0.25);
        }
        .toast.error {
            border-color: rgba(218, 54, 51, 0.5);
            box-shadow: 0 8px 30px rgba(218, 54, 51, 0.25);
        }

        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.25) 0%, transparent 70%);
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.5s, opacity 0.5s;
            border-radius: inherit;
        }
        .ripple:active::after {
            transform: scale(2.5);
            opacity: 1;
            transition: transform 0s, opacity 0s;
        }

        .text-muted {
            color: var(--text-muted);
        }
        .text-center {
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        .storage-badge {
            background: rgba(35, 134, 54, 0.15);
            color: #3fb950;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.65em;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            border: 1px solid rgba(35, 134, 54, 0.3);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- شاشة المصادقة -->
        <div id="authScreen" class="screen active">
            <div class="auth-container">
                <div class="auth-box">
                    <h2>📸 <span>SecureGram</span></h2>
                    <div id="loginForm">
                        <label>👤 اسم المستخدم</label>
                        <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم" autocomplete="username">
                        <label>🔒 كلمة المرور</label>
                        <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" autocomplete="current-password">
                        <div class="error hidden" id="loginError"></div>
                        <button id="loginBtn" class="ripple">🚀 تسجيل الدخول</button>

        <!-- الشاشة الرئيسية -->
        <div id="mainScreen" class="screen">
            <div class="top-bar" id="topBar">
                <div class="left-group">
                    <button class="back-btn hidden" id="backBtn">‹</button>

                </div>

            </div>
            <div class="content" id="mainContent"></div>
            <div class="bottom-nav" id="bottomNav">
                <div class="nav-item active ripple" data-tab="home"><span>🏠</span>الرئيسية</div>
                <div class="nav-item ripple" data-tab="search"><span>🔍</span>بحث</div>
                <div class="nav-item ripple" data-tab="reels"><span>🎥</span>ريلز</div>

                <div class="nav-item ripple" data-tab="profile"><span>👤</span>حسابي<span class="badge" style="display:none;">0</span></div>
                <div class="nav-item hidden ripple" data-tab="admin" id="adminTab"><span>⚙️</span>إدارة</div>
            </div>
            <div class="create-post hidden" id="createPostArea">
                <div class="post-preview" id="postPreview">
                    <button class="remove-preview" id="removePreview">✕</button>
                    <div id="previewContent"></div>

                    <label class="file-label ripple" id="postFileLabel">📎 اختيار ملف</label>
                    <input type="file" id="postMediaInput" accept="image/*,video/*">
                    <input type="text" id="postCaptionInput" placeholder="اكتب تعليقاً...">

        <div class="sparkle-container" id="sparkleContainer"></div>
    </div>

    <script>
        (() => {
            'use strict';
            const db = new Dexie('SecureGramProV7');
            db.version(6).stores({
                accounts: 'uuid, username, createdAt, isAdmin',
                sessions: 'key',
                posts: 'id, authorUuid, timestamp, isReel',
                comments: 'id, postId, timestamp',
                likes: 'id, postId, userId',
                follows: 'id, followerUuid, followingUuid',
                stories: 'id, authorUuid, expiresAt',
                chats: 'id, participants, lastMessage, lastTime',
                messages: '++id, chatId, timestamp, senderUuid, read, status',
                reports: 'id, postId, reporterUuid, timestamp, resolved',
                notifications: '++id, targetUuid, timestamp, read'
            });

            let currentUser = null;
            let currentTab = 'home';
            let viewingProfileUuid = null;
            let activeChatPeerId = null;
            let peerConnections = {};
            let peer = null;
            let typingTimeout = null;
            let storyViewTimeout = null;
            let adminMode = false;
            let chatRefreshInterval = null;
            let selectedFileDataUrl = null;
            let selectedFileType = null;

            async function generateAESKey() { return crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, [
                    'encrypt', 'decrypt'
                ]); }
            async function exportKey(key) { const raw = await crypto.subtle.exportKey('raw', key); return Array.from(
                new Uint8Array(raw)); }
            async function importKey(raw) { return crypto.subtle.importKey('raw', new Uint8Array(raw), { name: 'AES-GCM',
                    length: 256 }, true, ['encrypt', 'decrypt']); }
            async function encryptData(key, text) { const iv = crypto.getRandomValues(new Uint8Array(12));
                const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(
                text)); return { iv: Array.from(iv), data: Array.from(new Uint8Array(enc)) }; }
            async function decryptData(key, obj) { const iv = new Uint8Array(obj.iv);
                const data = new Uint8Array(obj.data);
                const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data); return new TextDecoder()
                    .decode(dec); }
            async function hashPassword(pw) { const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(
                    pw)); return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join(
                ''); }

            const ADMIN_UUID = 'admin-yaman-gadhat-001';
            const ADMIN_USERNAME = 'Yamangadhat';
            async function initAdmin() { const existing = await db.accounts.get(ADMIN_UUID); if (!existing) { await db.accounts
                    .put({ uuid: ADMIN_UUID, username: ADMIN_USERNAME, passwordHash: await hashPassword('Yaman@2008'),
                        profilePic: '', bio: '👑 المدير العام للنظام', createdAt: Date.now(), isAdmin: true }); } else if (
                    !existing.isAdmin) { await db.accounts.update(ADMIN_UUID, { isAdmin: true }); } }
            async function saveSession(uuid) { await db.sessions.put({ key: 'currentUser', uuid }); }
            async function loadSession() { const s = await db.sessions.get('currentUser'); return s ? s.uuid : null; }
            async function clearSession() { await db.sessions.delete('currentUser'); }

            function generateId() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random()
                    .toString(36).slice(2, 7); }

            function timeAgo(ts) { const diff = Date.now() - ts;
                const sec = Math.floor(diff / 1000); if (sec < 60) return 'الآن';
                const min = Math.floor(sec / 60); if (min < 60) return min + ' د';
                const hr = Math.floor(min / 60); if (hr < 24) return hr + ' س';
                const day = Math.floor(hr / 24); if (day < 30) return day + ' ي';
                const mon = Math.floor(day / 30); if (mon < 12) return mon + ' ش'; return Math.floor(mon / 12) + ' س'; }

            function getFileType(file) { if (!file) return null; if (file.type.startsWith('image/')) return 'image'; if (
                    file.type.startsWith('video/')) return 'video'; return null; }

            function readFileAsDataURL(file) { return new Promise((resolve, reject) => { const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file); }); }

            async function compressImage(dataUrl, maxWidth = 800, quality = 0.7) { return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => { const canvas = document.createElement('canvas');
                        let w = img.width,
                            h = img.height; if (w > maxWidth) { h = (maxWidth / w) * h;
                            w = maxWidth; }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality)); };
                    img.onerror = reject;
                    img.src = dataUrl; }); }

            function showToast(message, type = 'info', duration = 3000) { const container = document.getElementById(
                    'toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
                toast.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span> ${message}`;
                container.appendChild(toast);
                const remove = () => { toast.classList.add('removing');
                    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 350); };
                toast.onclick = remove;
                setTimeout(remove, duration); }

            function spawnSparkles(x, y, count = 12) { const container = document.getElementById('sparkleContainer');
                const colors = ['#58a6ff', '#c084fc', '#f59e0b', '#3fb950', '#f85149', '#fcd34d']; for (let i = 0; i <
                    count; i++) { const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = x + 'px';
                    sparkle.style.top = y + 'px';
                    sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    sparkle.style.width = (4 + Math.random() * 8) + 'px';
                    sparkle.style.height = sparkle.style.width;
                    sparkle.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
                    sparkle.style.setProperty('--dy', (Math.random() - 0.5) * 200 - 60 + 'px');
                    sparkle.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
                    container.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 1500); } }

            async function isFollowing(targetUuid) { return !!(await db.follows.where({ followerUuid: currentUser.uuid,
                followingUuid: targetUuid }).first()); }
            async function getFollowers(uuid) { return await db.follows.where('followingUuid').equals(uuid).toArray(); }
            async function getFollowing(uuid) { return await db.follows.where('followerUuid').equals(uuid).toArray(); }

            async function followUser(targetUuid) { if (targetUuid === currentUser.uuid) return;
                const exists = await db.follows.where({ followerUuid: currentUser.uuid, followingUuid: targetUuid })
                    .first(); if (exists) { await db.follows.delete(exists.id);
                    showToast('تم إلغاء متابعة المستخدم', 'info'); } else { await db.follows.put({ id: generateId(),
                        followerUuid: currentUser.uuid, followingUuid: targetUuid, timestamp: Date.now() });
                    showToast('تمت المتابعة ✅', 'success');
                    await addNotification(targetUuid, `${currentUser.username} يتابعك الآن`, 'follow'); } if (
                    viewingProfileUuid === targetUuid) await renderProfile(targetUuid);
                renderTab(currentTab); }

            async function addNotification(targetUuid, message, type = 'general') { await db.notifications.put({ id: generateId(),
                    targetUuid, message, type, timestamp: Date.now(), read: false, fromUuid: currentUser.uuid,
                    fromUsername: currentUser.username }); await updateUnreadCounts(); if (Notification.permission ===
                    'granted') { new Notification('SecureGram', { body: message, icon: '📸' }); } }
            async function getUnreadCount(uuid) { return await db.notifications.where({ targetUuid: uuid, read: false })
                .count(); }
            async function updateUnreadCounts() { if (!currentUser) return;
                const count = await getUnreadCount(currentUser.uuid);
                const badge = document.querySelector('.nav-item[data-tab="profile"] .badge'); if (badge) { if (count > 0) {
                        badge.textContent = count;
                        badge.style.display = 'inline'; } else { badge.style.display = 'none'; } } }

            const mainContent = document.getElementById('mainContent');
            const backBtn = document.getElementById('backBtn');
            const topAvatar = document.getElementById('topAvatar');
            const createPostArea = document.getElementById('createPostArea');
            const adminTab = document.getElementById('adminTab');

            function showBackButton(show = true) { backBtn.classList.toggle('hidden', !show); }
            backBtn.onclick = () => { if (viewingProfileUuid) { viewingProfileUuid = null;
                    renderTab(currentTab);
                    showBackButton(false); } else if (activeChatPeerId) { stopChatRefresh();
                    activeChatPeerId = null;
                    renderTab('chats');
                    showBackButton(false); } };

            function switchTab(tab) { currentTab = tab;
                viewingProfileUuid = null; if (activeChatPeerId) stopChatRefresh();
                activeChatPeerId = null;
                showBackButton(false);
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                const el = document.querySelector(`[data-tab="${tab}"]`); if (el) el.classList.add('active');
                renderTab(tab); }

            document.querySelectorAll('.nav-item').forEach(item => { item.addEventListener('click', () => { const tab =
                        item.dataset.tab; if (tab === 'admin' && !adminMode) { showToast(
                            '🔐 ليس لديك صلاحية الدخول إلى لوحة الإدارة', 'error'); return; }
                    switchTab(tab); }); });

            async function renderTab(tab) { createPostArea.classList.add('hidden');
                mainContent.innerHTML = ''; if (currentUser && currentUser.isAdmin) adminTab.classList.remove('hidden');
                else adminTab.classList.add('hidden'); switch (tab) { case 'home': await renderHome();
                    createPostArea.classList.remove('hidden'); break; case 'search': renderSearch(); break; case 'reels': await
                        renderReels();
                    createPostArea.classList.remove('hidden'); break; case 'chats': await renderChatList(); break; case 'profile': await
                        renderProfile(currentUser.uuid); break; case 'admin': await renderAdminPanel(); break; } if (
                    currentUser) topAvatar.src = currentUser.profilePic || ''; await updateUnreadCounts(); }

            async function renderHome() { const storiesDiv = document.createElement('div');
                storiesDiv.className = 'stories-container';
                const myStoryBtn = document.createElement('div');
                myStoryBtn.className = 'story';
                myStoryBtn.innerHTML =
                    `<img src="${currentUser.profilePic||''}" alt="قصتي"><span class="username">قصتي</span><span class="add-story">+</span>`;
                myStoryBtn.onclick = () => createStory();
                storiesDiv.appendChild(myStoryBtn);
                const followingList = await db.follows.where('followerUuid').equals(currentUser.uuid).toArray();
                const followedUuids = followingList.map(f => f.followingUuid);
                const allUsers = await db.accounts.toArray();
                const stories = await db.stories.where('expiresAt').above(Date.now()).toArray(); for (let u of allUsers
                    .filter(u => followedUuids.includes(u.uuid) || u.uuid === currentUser.uuid)) { const userStories =
                        stories.filter(s => s.authorUuid === u.uuid); if (userStories.length > 0 && u.uuid !==
                        currentUser.uuid) { const sDiv = document.createElement('div');
                        sDiv.className = 'story';
                        sDiv.innerHTML =
                            `<img src="${u.profilePic||''}" alt=""><span class="username">${u.username}</span>`;
                        sDiv.onclick = () => viewStory(userStories, 0);
                        storiesDiv.appendChild(sDiv); } }
                mainContent.appendChild(storiesDiv);
                const allPosts = await db.posts.orderBy('timestamp').reverse().toArray();
                const timelinePosts = allPosts.filter(p => p.authorUuid === currentUser.uuid || followedUuids.includes(p
                    .authorUuid)); if (timelinePosts.length === 0) { const empty = document.createElement('p');
                    empty.style.cssText = 'text-align:center;color:#8b949e;padding:30px 0;';
                    empty.textContent = '📭 لا توجد منشورات. تابع مستخدمين لرؤية محتواهم!';
                    mainContent.appendChild(empty); } else { for (let i = 0; i < timelinePosts.length; i++) { const el =
                            await createPostElement(timelinePosts[i]);
                        el.style.animationDelay = `${i*0.06}s`;
                        mainContent.appendChild(el); } } }

            async function createPostElement(post) { const div = document.createElement('div');
                div.className = 'post';
                div.dataset.postid = post.id;
                const author = await db.accounts.get(post.authorUuid) || { username: 'مستخدم', profilePic: '' };
                const likes = await db.likes.where('postId').equals(post.id).toArray();
                const likedByMe = likes.some(l => l.userId === currentUser.uuid);
                const comments = await db.comments.where('postId').equals(post.id).sortBy('timestamp');
                let html = `<div class="post-header" data-uuid="${author.uuid}"><img src="${author.profilePic||''}" alt=""><span class="username">${author.username}</span><span class="time">${timeAgo(post.timestamp)}</span><span class="post-options" data-postid="${post.id}">⋯</span></div>
            <div class="post-media" data-postid="${post.id}">${post.mediaType==='image'?`<img src="${post.mediaUrl}" alt="منشور" loading="lazy">`:`<video src="${post.mediaUrl}" controls preload="metadata" playsinline></video>`}<span class="double-tap-heart">❤️</span></div>
            <div class="post-actions"><span class="like-btn ${likedByMe?'liked':''}" data-postid="${post.id}">${likedByMe?'❤️':'🤍'}</span><span class="comment-toggle" data-postid="${post.id}">💬</span><span class="share-btn" data-postid="${post.id}">🔗</span></div>
            <div class="post-likes" data-postid="${post.id}">${likes.length} ${likes.length===1?'إعجاب':'إعجابات'}</div>
            <div class="post-caption"><strong>${author.username}</strong> ${post.caption||''}</div>
            <div class="post-comments" id="comments-${post.id}">${comments.slice(0,3).map(c=>`<div class="comment"><strong>${c.authorUsername}</strong> <span class="comment-text">${c.text}</span> <span class="comment-time">${timeAgo(c.timestamp)}</span></div>`).join('')}${comments.length>3?`<div class="comment text-muted" style="font-size:0.8em;cursor:pointer;" id="showMore-${post.id}">عرض ${comments.length-3} تعليقات أخرى</div>`:''}${comments.slice(3).map(c=>`<div class="comment hidden"><strong>${c.authorUsername}</strong> <span class="comment-text">${c.text}</span> <span class="comment-time">${timeAgo(c.timestamp)}</span></div>`).join('')}
            <div class="add-comment"><input type="text" placeholder="أضف تعليق..." data-postid="${post.id}"><button data-postid="${post.id}">نشر</button></div></div>`;
                div.innerHTML = html;
                div.querySelector('.post-header').onclick = () => viewProfile(author.uuid);
                const likeBtn = div.querySelector('.like-btn');
                likeBtn.onclick = async (e) => { e.stopPropagation();
                    await toggleLike(post, likeBtn, div); };
                const mediaEl = div.querySelector('.post-media');
                let tapTimer = null;
                mediaEl.addEventListener('click', (e) => { if (e.target.closest('.double-tap-heart')) return; if (
                        tapTimer) { clearTimeout(tapTimer);
                        tapTimer = null;
                        const heart = mediaEl.querySelector('.double-tap-heart');
                        heart.classList.remove('active');
                        void heart.offsetWidth;
                        heart.classList.add('active');
                        const rect = mediaEl.getBoundingClientRect();
                        spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2, 8); if (!likedByMe)
                            toggleLike(post, likeBtn, div); } else { tapTimer = setTimeout(() => { tapTimer = null; },
                            300); } });
                const showMore = div.querySelector(`#showMore-${post.id}`); if (showMore) { showMore.onclick = () => { div
                            .querySelectorAll('.post-comments .comment.hidden').forEach(c => c.classList.remove(
                                'hidden'));
                        showMore.remove(); }; }
                div.querySelectorAll('.add-comment button').forEach(btn => { btn.onclick = async () => { const input = btn
                            .parentElement.querySelector('input');
                        const text = input.value.trim(); if (!text) return;
                        const postId = btn.dataset.postid; await db.comments.put({ id: generateId(), postId,
                            authorUuid: currentUser.uuid, authorUsername: currentUser.username, text,
                            timestamp: Date.now() }); if (post.authorUuid !== currentUser.uuid) { await addNotification(
                                post.authorUuid,
                                `${currentUser.username} علق: "${text.slice(0,30)}${text.length>30?'…':''}"`,
                                'comment'); }
                        renderTab(currentTab); }; });
                div.querySelector('.post-options').onclick = (e) => { e.stopPropagation(); if (post.authorUuid ===
                        currentUser.uuid || currentUser.isAdmin) { if (confirm('هل تريد حذف هذا المنشور؟')) deletePost(post
                            .id); } else { if (confirm('هل تريد الإبلاغ عن هذا المنشور؟')) reportPost(post.id); } };
                div.querySelector('.share-btn').onclick = (e) => { e.stopPropagation();
                    const url = window.location.href + `?post=${post.id}`; if (navigator.share) navigator.share({ title: 'منشور من SecureGram',
                        url }); else navigator.clipboard.writeText(url).then(() => showToast('📋 تم نسخ الرابط',
                        'success')).catch(() => showToast('🔗 الرابط: ' + url, 'info', 5000)); }; return div; }

            async function toggleLike(post, likeBtn, postDiv) { const postId = post.id;
                const existing = await db.likes.where({ postId, userId: currentUser.uuid }).first(); if (existing) { await db
                        .likes.delete(existing.id);
                    likeBtn.classList.remove('liked');
                    likeBtn.textContent = '🤍'; } else { await db.likes.put({ id: generateId(), postId, userId: currentUser
                            .uuid, timestamp: Date.now() });
                    likeBtn.classList.add('liked');
                    likeBtn.textContent = '❤️';
                    likeBtn.classList.remove('liked');
                    void likeBtn.offsetWidth;
                    likeBtn.classList.add('liked'); if (post.authorUuid !== currentUser.uuid) { await addNotification(post
                            .authorUuid, `${currentUser.username} أعجب بمنشورك 💖`, 'like'); } }
                const newLikes = await db.likes.where('postId').equals(postId).toArray();
                const likesEl = postDiv.querySelector('.post-likes'); if (likesEl) likesEl.textContent =
                    `${newLikes.length} ${newLikes.length===1?'إعجاب':'إعجابات'}`; }
            async function deletePost(postId) { await db.posts.delete(postId);
                await db.comments.where('postId').equals(postId).delete();
                await db.likes.where('postId').equals(postId).delete();
                showToast('🗑️ تم حذف المنشور', 'success');
                renderTab(currentTab); }
            async function reportPost(postId) { await db.reports.put({ id: generateId(), postId, reporterUuid: currentUser.uuid,
                    timestamp: Date.now(), resolved: false });
                showToast('📢 تم الإبلاغ عن المنشور', 'warning'); }

            async function createStory() { const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'image/*,video/*';
                inp.onchange = async (e) => { const file = e.target.files[0]; if (!file) return; try { let dataUrl =
                            await readFileAsDataURL(file); if (file.type.startsWith('image/')) dataUrl = await compressImage(
                            dataUrl, 600, 0.6); await db.stories.put({ id: generateId(), authorUuid: currentUser.uuid,
                            mediaUrl: dataUrl, mediaType: getFileType(file), expiresAt: Date.now() + 86400000,
                            timestamp: Date.now() });
                        showToast('📸 تم نشر القصة', 'success');
                        renderTab('home'); } catch (err) { showToast('❌ حدث خطأ: ' + err.message, 'error'); } };
                inp.click(); }

            function viewStory(stories, index) { if (!stories || index >= stories.length) return;
                const story = stories[index];
                const modal = document.createElement('div');
                modal.className = 'story-modal';
                modal.innerHTML =
                    '<div class="story-progress"><div class="story-progress-bar"></div></div><button class="close-story">✕</button><div class="story-user"></div><div class="story-content"></div>';
                modal.querySelector('.story-user').innerHTML =
                    `<img src="${currentUser.profilePic||''}" alt=""> ${currentUser.username}`;
                modal.querySelector('.story-content').innerHTML = story.mediaType === 'image' ?
                    `<img src="${story.mediaUrl}" alt="قصة">` :
                    `<video src="${story.mediaUrl}" controls autoplay playsinline></video>`;
                document.getElementById('app').appendChild(modal);
                modal.querySelector('.close-story').onclick = () => { if (storyViewTimeout) clearTimeout(
                    storyViewTimeout);
                    modal.remove(); }; if (storyViewTimeout) clearTimeout(storyViewTimeout);
                storyViewTimeout = setTimeout(() => { if (modal.parentNode) modal.remove(); if (index + 1 < stories
                        .length) viewStory(stories, index + 1); }, 5000);
                modal.addEventListener('click', (e) => { if (e.target === modal || (e.target.closest('.story-content') && !
                        e.target.closest('video'))) { if (storyViewTimeout) clearTimeout(storyViewTimeout);
                        modal.remove(); if (index + 1 < stories.length) viewStory(stories, index + 1); } }); }
