            async function exportData() {
                try {
                    const data = { version: '5.0', exportedAt: new Date().toISOString(), accounts: await db.accounts
                            .toArray(), posts: await db.posts.toArray(), comments: await db.comments.toArray(),
                        likes: await db.likes.toArray(), follows: await db.follows.toArray(), stories: await db.stories
                            .toArray(), messages: await db.messages.toArray(), chats: await db.chats.toArray(),
                        reports: await db.reports.toArray(), notifications: await db.notifications.toArray() };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `securegram_backup_${Date.now()}.json`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                    showToast('📤 تم التصدير بنجاح', 'success');
                } catch (e) { showToast('❌ فشل: ' + e.message, 'error'); }
            }

            async function importData() {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'application/json';
                inp.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        const data = JSON.parse(await file.text());
                        if (!data.accounts || !data.posts) { showToast('❌ ملف غير صالح', 'error'); return; }
                        if (!confirm('سيتم استبدال جميع البيانات. متأكد؟')) return;
                        const tables = [db.accounts, db.posts, db.comments, db.likes, db.follows, db.stories, db
                            .messages, db.chats, db.reports, db.notifications
                        ];
                        for (let t of tables) await t.clear();
                        await db.accounts.bulkPut(data.accounts);
                        await db.posts.bulkPut(data.posts || []);
                        await db.comments.bulkPut(data.comments || []);
                        await db.likes.bulkPut(data.likes || []);
                        await db.follows.bulkPut(data.follows || []);
                        await db.stories.bulkPut(data.stories || []);
                        await db.messages.bulkPut(data.messages || []);
                        await db.chats.bulkPut(data.chats || []);
                        await db.reports.bulkPut(data.reports || []);
                        await db.notifications.bulkPut(data.notifications || []);
                        showToast('📥 تم الاستيراد بنجاح', 'success');
                        const saved = await loadSession();
                        if (saved) currentUser = await db.accounts.get(saved);
                        renderTab('admin');
                    } catch (err) { showToast('❌ فشل: ' + err.message, 'error'); }
                };
                inp.click();
            }

            async function clearAllData() {
                if (!confirm('⚠️ مسح جميع البيانات؟ لا يمكن التراجع!')) return;
                if (!confirm('تأكيد نهائي؟')) return;
                const tables = [db.accounts, db.posts, db.comments, db.likes, db.follows, db.stories, db.messages, db
                    .chats, db.reports, db.notifications, db.sessions
                ];
                for (let t of tables) await t.clear();
                await initAdmin();
                showToast('🗑️ تم مسح جميع البيانات', 'warning');
                location.reload();
            }

            async function changeAdminPassword() {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                const box = document.createElement('div');
                box.className = 'modal-box';
                box.innerHTML = `
            <button class="modal-close">✕</button><h3>🔑 تغيير كلمة مرور الأدمن</h3>
            <label>الحالية</label><input type="password" id="oldAdminPass">
            <label>الجديدة</label><input type="password" id="newAdminPass" placeholder="6 أحرف على الأقل">
            <label>تأكيد الجديدة</label><input type="password" id="confirmAdminPass">
            <div class="modal-row"><button class="modal-btn secondary">إلغاء</button><button class="modal-btn primary" id="changePassConfirm">✅ تغيير</button></div>`;
                overlay.appendChild(box);
                document.getElementById('app').appendChild(overlay);
                const close = () => overlay.remove();
                overlay.querySelector('.modal-close').onclick = close;
                overlay.querySelector('.modal-btn.secondary').onclick = close;
                overlay.onclick = (e) => { if (e.target === overlay) close(); };
                document.getElementById('changePassConfirm').onclick = async () => {
                    const old = document.getElementById('oldAdminPass').value;
                    const np = document.getElementById('newAdminPass').value;
                    const cp = document.getElementById('confirmAdminPass').value;
                    if (np.length < 6) { showToast('❌ كلمة المرور 6 أحرف على الأقل', 'error'); return; }
                    if (np !== cp) { showToast('❌ غير متطابقتين', 'error'); return; }
                    const admin = await db.accounts.get(ADMIN_UUID);
                    if (admin.passwordHash !== await hashPassword(old)) { showToast('❌ كلمة مرور حالية خاطئة',
                            'error'); return; }
                    await db.accounts.update(ADMIN_UUID, { passwordHash: await hashPassword(np) });
                    showToast('✅ تم التغيير بنجاح', 'success');
                    overlay.remove();
                };
            }

            // ====================================================================
            //  12. المحادثات
            // ====================================================================
            async function renderChatList() {
                const container = document.createElement('div');
                const allMessages = await db.messages.toArray();
                const chatIds = [...new Set(allMessages.map(m => m.chatId))];
                const chatData = [];
                for (let chatId of chatIds) {
                    const msgs = await db.messages.where('chatId').equals(chatId).sortBy('timestamp');
                    if (!msgs.length) continue;
                    const last = msgs[msgs.length - 1];
                    const peerId = chatId.split('_').find(p => p !== currentUser.uuid);
                    if (!peerId) continue;
                    const user = await db.accounts.get(peerId);
                    if (!user) continue;
                    const unread = msgs.filter(m => m.senderUuid === peerId && !m.read).length;
                    chatData.push({ chatId, peerId, user, last, unread });
                }
                chatData.sort((a, b) => b.last.timestamp - a.last.timestamp);
                if (!chatData.length) { container.innerHTML =
                        '<p style="text-align:center;color:#8b949e;padding:30px 0;">💬 لا توجد محادثات.</p>';
                    mainContent.appendChild(container); return; }
                for (let i = 0; i < chatData.length; i++) {
                    const c = chatData[i];
                    const item = document.createElement('div');
                    item.className = 'chat-list-item';
                    item.style.animationDelay = `${i*0.05}s`;
                    const lastText = c.last.mediaUrl ? (c.last.mediaType === 'image' ? '📷 صورة' : '🎬 فيديو') : (c.last
                        .text || '');
                    item.innerHTML = `
                <img src="${c.user.profilePic||''}" alt=""><div class="chat-info"><div class="name">${c.user.username}</div><div class="last-msg">${c.last.senderUuid===currentUser.uuid?'أنت: ':''}${lastText}</div></div>
                <div class="chat-time">${timeAgo(c.last.timestamp)}</div>${c.unread>0?`<div class="unread">${c.unread}</div>`:''}`;
                    item.onclick = () => startChatWith(c.peerId);
                    container.appendChild(item);
                }
                mainContent.appendChild(container);
            }

            function startChatWith(peerId) {
                connectToPeer(peerId);
                activeChatPeerId = peerId;
                showBackButton(true);
                renderChat(peerId);
            }

            async function connectToPeer(peerId) {
                if (peerConnections[peerId]) return;
                if (!peer) { showToast('⚠️ جاري الاتصال...', 'info'); return; }
                const conn = peer.connect(peerId, { reliable: true });
                conn.on('open', async () => {
                    peerConnections[peerId] = conn;
                    setupConnection(conn, peerId);
                    const key = await generateAESKey();
                    conn.send({ type: 'aes-key', key: await exportKey(key) });
                    conn._aesKey = key;
                    showToast('📶 تم الاتصال', 'success');
                });
                conn.on('error', () => showToast('❌ فشل الاتصال', 'error'));
            }

            function setupConnection(conn, peerId) {
                conn.on('data', async (data) => {
                    try {
                        if (data.type === 'aes-key') conn._aesKey = await importKey(data.key);
                        else if (data.type === 'encrypted-message') {
                            const text = await decryptData(conn._aesKey, data.payload);
                            if (activeChatPeerId === peerId) displayMessageInChat(text, 'received');
                            await saveMessageToDB(peerId, text, 'received');
                        } else if (data.type === 'encrypted-media') {
                            const url = await decryptData(conn._aesKey, data.payload);
                            if (activeChatPeerId === peerId) displayMessageInChat('', 'received', url, data
                                .mediaType);
                            await saveMessageToDB(peerId, '', 'received', url, data.mediaType);
                        } else if (data.type === 'typing') {
                            if (activeChatPeerId === peerId) showTypingIndicator();
                        } else if (data.type === 'read-receipt') {
                            await db.messages.where({ chatId: getChatId(peerId), senderUuid: peerId, read: false })
                                .modify({ read: true });
                        }
                    } catch (e) { console.warn('خطأ:', e); }
                });
            }

            function getChatId(peerId) { return [currentUser.uuid, peerId].sort().join('_'); }

            async function renderChat(peerId) {
                const user = await db.accounts.get(peerId);
                if (!user) { mainContent.innerHTML =
                    '<p class="text-center text-muted">المستخدم غير موجود</p>'; return; }
                topAvatar.src = user.profilePic || '';
                mainContent.innerHTML = `
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
              <button class="attach-btn" id="attachBtn">📎</button>
              <input type="text" id="chatInput" placeholder="اكتب رسالة...">
              <button id="sendBtn">➤</button>
            </div>`;
                await loadChatMessages(peerId);
                document.getElementById('sendBtn').onclick = () => sendMessageInChat(peerId);
                document.getElementById('chatInput').onkeydown = (e) => { if (e.key === 'Enter') sendMessageInChat(
                        peerId); };
                document.getElementById('chatInput').oninput = () => {
                    const conn = peerConnections[peerId];
                    if (conn && conn._aesKey) conn.send({ type: 'typing' });
                };
                document.getElementById('attachBtn').onclick = () => attachMediaInChat(peerId);
                showBackButton(true);
            }

            async function loadChatMessages(peerId) {
                const msgsDiv = document.getElementById('chatMessages');
                if (!msgsDiv) return;
                msgsDiv.innerHTML = '';
                const chatId = getChatId(peerId);
                const messages = await db.messages.where('chatId').equals(chatId).sortBy('timestamp');
                await db.messages.where({ chatId, senderUuid: peerId, read: false }).modify({ read: true });
                for (let i = 0; i < messages.length; i++) {
                    const m = messages[i];
                    const type = m.senderUuid === currentUser.uuid ? 'sent' : 'received';
                    displayMessageInChat(m.text, type, m.mediaUrl, m.mediaType, m.timestamp, i);
                }
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
                const conn = peerConnections[peerId];
                if (conn && conn._aesKey) conn.send({ type: 'read-receipt' });
            }

            function displayMessageInChat(text, type, mediaUrl, mediaType, timestamp, index = 0) {
                const msgsDiv = document.getElementById('chatMessages');
                if (!msgsDiv) return;
                const div = document.createElement('div');
                div.className = `msg ${type}`;
                div.style.animationDelay = `${index*0.02}s`;
                let html = '';
                if (mediaUrl) html += mediaType === 'image' ?
                    `<div class="media-wrap"><img src="${mediaUrl}" alt="مرفق" loading="lazy"></div>` :
                    `<div class="media-wrap"><video src="${mediaUrl}" controls preload="metadata"></video></div>`;
                if (text) html += text;
                if (timestamp) html += `<span class="msg-time">${timeAgo(timestamp)}</span>`;
                div.innerHTML = html;
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            }

            function showTypingIndicator() {
                const msgsDiv = document.getElementById('chatMessages');
                if (!msgsDiv) return;
                const old = msgsDiv.querySelector('.typing-indicator');
                if (old) old.remove();
                const div = document.createElement('div');
                div.className = 'typing-indicator';
                div.innerHTML = '<span></span><span></span><span></span>';
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => { if (div.parentNode) div.remove(); }, 3000);
            }

            async function sendMessageInChat(peerId) {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if (!text) return;
                const conn = peerConnections[peerId];
                if (!conn || !conn._aesKey) { showToast('❌ غير متصل', 'error'); return; }
                try {
                    const enc = await encryptData(conn._aesKey, text);
                    conn.send({ type: 'encrypted-message', payload: enc });
                    displayMessageInChat(text, 'sent');
                    await saveMessageToDB(peerId, text, 'sent');
                    input.value = '';
                } catch (e) { showToast('❌ فشل: ' + e.message, 'error'); }
            }

            async function attachMediaInChat(peerId) {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'image/*,video/*';
                inp.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        let dataUrl = await readFileAsDataURL(file);
                        if (file.type.startsWith('image/')) dataUrl = await compressImage(dataUrl, 600, 0.6);
                        const mediaType = getFileType(file);
                        const conn = peerConnections[peerId];
                        if (conn && conn._aesKey) {
                            const enc = await encryptData(conn._aesKey, dataUrl);
                            conn.send({ type: 'encrypted-media', payload: enc, mediaType });
                            displayMessageInChat('', 'sent', dataUrl, mediaType);
                            await saveMessageToDB(peerId, '', 'sent', dataUrl, mediaType);
                            showToast('📎 تم الإرفاق', 'success');
                        }
                    } catch (err) { showToast('❌ فشل: ' + err.message, 'error'); }
                };
                inp.click();
            }

            async function saveMessageToDB(peerId, text, type, mediaUrl, mediaType) {
                const chatId = getChatId(peerId);
                const senderUuid = type === 'sent' ? currentUser.uuid : peerId;
                await db.messages.add({ chatId, senderUuid, receiverUuid: type === 'sent' ? peerId : currentUser.uuid,
                    text: text || '', mediaUrl: mediaUrl || '', mediaType: mediaType || '', timestamp: Date.now(),
                    read: type === 'sent' });
                await db.chats.put({ id: chatId, participants: [currentUser.uuid, peerId].sort(), lastMessage: text || (
                        mediaType === 'image' ? '📷 صورة' : '🎬 فيديو'), lastTime: Date.now(), lastSender: senderUuid });
            }

            // ====================================================================
            //  13. PeerJS
            // ====================================================================
            function initPeer() {
                peer = new Peer({
                    host: '0.peerjs.com',
                    port: 443,
                    secure: true,
                    config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
                });
                peer.on('open', (id) => {
                    console.log('🔗 PeerJS ID:', id);
                    if (currentUser) db.accounts.update(currentUser.uuid, { peerId: id });
                });
                peer.on('connection', (conn) => {
                    const pid = conn.peer;
                    peerConnections[pid] = conn;
                    setupConnection(conn, pid);
                    showToast('📞 اتصال وارد', 'info');
                });
                peer.on('error', (err) => console.warn('PeerJS:', err));
            }

            // ====================================================================
            //  14. نشر منشور
            // ====================================================================
            document.getElementById('publishPostBtn').onclick = async () => {
                const fileInput = document.getElementById('postMediaInput');
                const file = fileInput.files[0];
                if (!file) { showToast('⚠️ اختر ملفاً', 'warning'); return; }
                const caption = document.getElementById('postCaptionInput').value.trim();
                const isReel = document.getElementById('postIsReel').checked;
                const mediaType = getFileType(file);
                if (!mediaType) { showToast('❌ نوع غير مدعوم', 'error'); return; }
                try {
                    let dataUrl = await readFileAsDataURL(file);
                    if (mediaType === 'image') dataUrl = await compressImage(dataUrl, 800, 0.7);
                    await db.posts.put({ id: generateId(), authorUuid: currentUser.uuid, authorUsername: currentUser
                            .username, caption, mediaUrl: dataUrl, mediaType, timestamp: Date.now(), isReel });
                    fileInput.value = '';
                    document.getElementById('postCaptionInput').value = '';
                    document.getElementById('postIsReel').checked = false;
                    document.getElementById('postFileLabel').textContent = '📎 اختيار ملف';
                    showToast('📤 تم النشر', 'success');
                    renderTab('home');
                } catch (err) { showToast('❌ خطأ: ' + err.message, 'error'); }
            };
            document.getElementById('postMediaInput').onchange = function() {
                const label = document.getElementById('postFileLabel');
                label.textContent = this.files.length > 0 ? '📎 ' + this.files[0].name.slice(0, 20) : '📎 اختيار ملف';
            };

            // ====================================================================
            //  15. المصادقة
            // ====================================================================
            document.getElementById('showRegister').onclick = () => { document.getElementById('loginForm').style.display =
                    'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginError').classList.add('hidden'); };
            document.getElementById('showLogin').onclick = () => { document.getElementById('registerForm').style.display =
                    'none';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('regError').classList.add('hidden'); };

            document.getElementById('loginBtn').onclick = async () => {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('loginError');
                errorEl.classList.add('hidden');
                if (!username || !password) { errorEl.textContent = '⚠️ يرجى ملء جميع الحقول';
                    errorEl.classList.remove('hidden'); return; }
                try {
                    const user = (await db.accounts.toArray()).find(a => a.username === username);
                    if (!user) { errorEl.textContent = '❌ المستخدم غير موجود';
                        errorEl.classList.remove('hidden'); return; }
                    if (user.passwordHash !== await hashPassword(password)) { errorEl.textContent = '❌ كلمة مرور خاطئة';
                        errorEl.classList.remove('hidden'); return; }
                    currentUser = user;
                    await saveSession(user.uuid);
                    document.getElementById('authScreen').classList.remove('active');
                    document.getElementById('mainScreen').classList.add('active');
                    adminMode = user.isAdmin || false;
                    if (peer) db.accounts.update(user.uuid, { peerId: peer.id });
                    switchTab('home');
                    showToast(`👋 مرحباً ${user.username}`, 'success');
                } catch (e) { errorEl.textContent = '❌ ' + e.message;
                    errorEl.classList.remove('hidden'); }
            };

            document.getElementById('registerBtn').onclick = async () => {
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const bio = document.getElementById('regBio').value.trim();
                const errorEl = document.getElementById('regError');
                errorEl.classList.add('hidden');
                if (username.length < 3) { errorEl.textContent = '⚠️ اسم المستخدم 3 أحرف على الأقل';
                    errorEl.classList.remove('hidden'); return; }
                if (password.length < 6) { errorEl.textContent = '⚠️ كلمة المرور 6 أحرف على الأقل';
                    errorEl.classList.remove('hidden'); return; }
                if ((await db.accounts.toArray()).some(a => a.username === username)) { errorEl.textContent =
                        '❌ اسم المستخدم موجود';
                    errorEl.classList.remove('hidden'); return; }
                try {
                    const newUser = { uuid: generateId(), username, passwordHash: await hashPassword(password),
                        profilePic: '', bio: bio || '📝 مرحباً، أنا في SecureGram!', createdAt: Date.now(),
                        isAdmin: false };
                    await db.accounts.put(newUser);
                    currentUser = newUser;
                    await saveSession(newUser.uuid);
                    document.getElementById('authScreen').classList.remove('active');
                    document.getElementById('mainScreen').classList.add('active');
                    if (peer) db.accounts.update(newUser.uuid, { peerId: peer.id });
                    switchTab('home');
                    showToast(`🎉 مرحباً ${username}!`, 'success');
                } catch (e) { errorEl.textContent = '❌ ' + e.message;
                    errorEl.classList.remove('hidden'); }
            };

            window.logout = async function() {
                if (confirm('هل تريد تسجيل الخروج؟')) {
                    await clearSession();
                    currentUser = null;
                    peerConnections = {};
                    activeChatPeerId = null;
                    adminMode = false;
                    document.getElementById('mainScreen').classList.remove('active');
                    document.getElementById('authScreen').classList.add('active');
                    document.getElementById('loginPassword').value = '';
                    showToast('👋 تم تسجيل الخروج', 'info');
                }
            };

            function viewProfile(uuid) {
                viewingProfileUuid = uuid;
                showBackButton(true);
                renderProfile(uuid);
            }

            function handleDeepLink() {
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('post');
                if (postId) setTimeout(async () => { const post = await db.posts.get(postId); if (post) showPostModal(
                        post); }, 500);
            }

            // ====================================================================
            //  16. التهيئة
            // ====================================================================
            (async function init() {
                try {
                    if (Notification.permission === 'default') Notification.requestPermission();
                    await initAdmin();
                    const savedUUID = await loadSession();
                    if (savedUUID) {
                        const user = await db.accounts.get(savedUUID);
                        if (user) { currentUser = user;
                            adminMode = user.isAdmin || false;
                            document.getElementById('authScreen').classList.remove('active');
                            document.getElementById('mainScreen').classList.add('active');
                            initPeer();
                            switchTab('home');
                            handleDeepLink(); return; }
                    }
                    document.getElementById('authScreen').classList.add('active');
                    document.getElementById('mainScreen').classList.remove('active');
                    initPeer();
                } catch (e) { console.error('خطأ:', e);
                    showToast('❌ خطأ في تحميل التطبيق', 'error'); }
            })();

            async function cleanExpiredStories() {
                const expired = await db.stories.where('expiresAt').below(Date.now()).toArray();
                for (let s of expired) await db.stories.delete(s.id);
            }
            setInterval(cleanExpiredStories, 60000);
            setInterval(async () => { if (currentUser) await updateUnreadCounts(); }, 30000);
            window.addEventListener('beforeunload', () => { if (currentUser) db.sessions.put({ key: 'currentUser',
                    uuid: currentUser.uuid }); });

            window.viewProfile = viewProfile;
            window.followUser = followUser;
            window.startChatWith = startChatWith;
            window.showToast = showToast;

            console.log('✅ SecureGram V5.0 – مع تأثيرات متحركة كاملة');
            console.log('👑 الأدمن: Yamangadhat / Yaman@2008');
            console.log('💾 بيانات محفوظة في IndexedDB');
        })();
    </script>
